spring.datasource.url=jdbc:mysql://localhost:3306/shopping?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:init-all.sql

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.shopping.entity
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.example.shopping.mapper=debug

spring.thymeleaf.cache=false  
