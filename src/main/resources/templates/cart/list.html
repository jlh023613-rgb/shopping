<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body>
<style>
    .cart-card { background: white; border: 1px solid var(--border); border-radius: 4px; }
    .cart-item { border-bottom: 1px solid #f0f0f0; transition: background-color 0.15s; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item.selected { background-color: var(--primary-light); }
    .product-img { width: 70px; height: 70px; object-fit: contain; border-radius: 2px; background: #fff; padding: 4px; border: 1px solid var(--border); }
    .quantity-btn { width: 24px; height: 24px; border-radius: 2px; padding: 0; font-size: 12px; }
    .btn-checkout { background-color: var(--primary); color: white; border: none; padding: 8px 32px; border-radius: 2px; font-weight: 600; font-size: 14px; }
    .btn-checkout:hover { background-color: var(--primary-dark); color: white; }
    .btn-checkout:disabled { background: #ccc; opacity: 0.7; }
    .option-tag {
        display: inline-block;
        background: #f8f8f8;
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 1px 6px;
        margin: 1px;
        font-size: 11px;
        color: var(--text-muted);
    }
    .insurance-tag {
        background: #fff8f0;
        color: var(--primary);
        border-color: #ffd4b8;
    }
    .item-total { font-size: 14px; color: var(--primary); font-weight: 700; }
    .insurance-fee { font-size: 11px; color: #ff8833; }
    .item-checkbox { width: 16px; height: 16px; cursor: pointer; }
    .select-all-checkbox { width: 15px; height: 15px; cursor: pointer; }
    .checkout-bar {
        position: sticky;
        bottom: 0;
        background: white;
        border-top: 2px solid var(--primary);
        z-index: 100;
    }
    .selected-count { color: var(--primary); font-weight: 600; }
</style>

<nav th:replace="~{layout :: nav}"></nav>

<div class="container py-3 pb-5">
    <h5 class="fw-bold mb-3" style="font-size: 16px;">我的购物车</h5>
    
    <div th:if="${cartItems != null and !cartItems.isEmpty()}">
        <div class="cart-card mb-3">
            <div class="p-2 border-bottom" style="background: #f8f8f8;">
                <div class="form-check">
                    <input class="form-check-input select-all-checkbox" type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                    <label class="form-check-label" for="selectAll" style="font-size: 13px;">
                        全选
                    </label>
                    <span class="text-muted ms-3" style="font-size: 12px;">共 <strong th:text="${cartItems.size()}">0</strong> 种商品</span>
                </div>
            </div>
            
            <div class="cart-item p-3" th:each="item : ${cartItems}" th:id="'item-' + ${item.id}">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <input type="checkbox" class="item-checkbox" th:value="${item.id}" 
                               th:data-price="${(item.unitPrice != null ? item.unitPrice : item.price) * item.quantity}"
                               th:data-insurance="${item.insurancePrice != null ? item.insurancePrice : 0}"
                               onclick="updateSelection()">
                    </div>
                    <div class="col-auto">
                        <a th:href="@{/product/{id}(id=${item.productId})}">
                            <img th:src="${item.imageUrl != null} ? ${item.imageUrl} : 'https://via.placeholder.com/70'" 
                                 class="product-img img-fluid" alt="商品图片">
                        </a>
                    </div>
                    <div class="col">
                        <a th:href="@{/product/{id}(id=${item.productId})}" class="text-decoration-none">
                            <h6 class="mb-1" style="font-size: 13px; color: var(--text-dark);" th:text="${item.productName}">商品名称</h6>
                        </a>
                        <div class="mb-1">
                            <span th:if="${item.selectedColor != null}" class="option-tag" th:text="${item.selectedColor}">颜色</span>
                            <span th:if="${item.selectedStorage != null}" class="option-tag" th:text="${item.selectedStorage}">存储</span>
                            <span th:if="${item.insuranceType != null and item.insuranceType != 'none'}" class="option-tag insurance-tag">
                                <span th:if="${item.insuranceType == 'basic'}">基础保障</span>
                                <span th:if="${item.insuranceType == 'premium'}">坏了换新</span>
                            </span>
                        </div>
                        <small class="text-muted" style="font-size: 12px;">单价: ¥<span th:text="${#numbers.formatDecimal(item.unitPrice != null ? item.unitPrice : item.price, 1, 2)}">0.00</span></small>
                    </div>
                    <div class="col-auto">
                        <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-flex align-items-center">
                            <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="btn btn-outline-secondary quantity-btn">-</button>
                            <input type="text" th:value="${item.quantity}" class="form-control form-control-sm text-center mx-1" style="width: 40px; font-size: 12px;" readonly>
                            <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="btn btn-outline-secondary quantity-btn">+</button>
                        </form>
                    </div>
                    <div class="col-auto text-end" style="min-width: 80px;">
                        <div class="item-total">
                            ¥<span th:text="${#numbers.formatDecimal((item.unitPrice != null ? item.unitPrice : item.price) * item.quantity, 1, 2)}">0.00</span>
                        </div>
                        <div th:if="${item.insurancePrice != null and item.insurancePrice > 0}" class="insurance-fee">
                            +保障 ¥<span th:text="${#numbers.formatDecimal(item.insurancePrice, 1, 2)}">0.00</span>
                        </div>
                    </div>
                    <div class="col-auto">
                        <form th:action="@{/cart/delete/{id}(id=${item.id})}" method="post">
                            <button type="submit" class="btn btn-outline-danger btn-sm" style="font-size: 11px; border-radius: 2px;" onclick="return confirm('确定删除该商品吗？')">
                                删除
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div th:if="${cartItems == null or cartItems.isEmpty()}" class="text-center py-5">
        <div class="bg-white p-5 d-inline-block" style="border: 1px solid var(--border); border-radius: 4px;">
            <p class="text-muted mb-0">购物车空空如也</p>
            <a href="/" class="btn mt-3" style="background-color: var(--primary); color: white; border-radius: 2px;">去逛逛</a>
        </div>
    </div>
</div>

<div th:if="${cartItems != null and !cartItems.isEmpty()}" class="checkout-bar">
    <div class="container py-2">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="form-check mb-0">
                    <input class="form-check-input select-all-checkbox" type="checkbox" id="selectAllBottom" onclick="toggleSelectAll()">
                    <label class="form-check-label" for="selectAllBottom" style="font-size: 12px;">
                        全选
                    </label>
                </div>
                <button class="btn btn-link btn-sm text-decoration-none ms-3" style="color: var(--text-muted); font-size: 12px;" onclick="deleteSelected()">
                    删除选中
                </button>
            </div>
            <div class="d-flex align-items-center">
                <div class="me-3 text-end">
                    <div class="text-muted" style="font-size: 12px;">
                        已选 <span class="selected-count" id="selectedCount">0</span> 件
                    </div>
                    <div>
                        合计: <strong style="color: var(--primary); font-size: 18px;">¥<span id="selectedTotal">0.00</span></strong>
                    </div>
                </div>
                <button class="btn btn-checkout" id="checkoutBtn" onclick="checkout()" disabled>
                    去结算
                </button>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script th:inline="javascript">
    function toggleSelectAll() {
        var isChecked = event.target.checked;
        document.querySelectorAll('.item-checkbox').forEach(function(cb) {
            cb.checked = isChecked;
        });
        document.querySelectorAll('.select-all-checkbox').forEach(function(cb) {
            cb.checked = isChecked;
        });
        updateSelection();
    }
    
    function updateSelection() {
        var checkboxes = document.querySelectorAll('.item-checkbox:checked');
        var total = 0;
        var count = 0;
        
        checkboxes.forEach(function(cb) {
            total += parseFloat(cb.dataset.price) + parseFloat(cb.dataset.insurance);
            count++;
        });
        
        document.getElementById('selectedCount').textContent = count;
        document.getElementById('selectedTotal').textContent = total.toFixed(2);
        
        var checkoutBtn = document.getElementById('checkoutBtn');
        checkoutBtn.disabled = count === 0;
        
        var allCheckboxes = document.querySelectorAll('.item-checkbox');
        var allChecked = allCheckboxes.length > 0 && count === allCheckboxes.length;
        document.querySelectorAll('.select-all-checkbox').forEach(function(cb) {
            cb.checked = allChecked;
        });
        
        document.querySelectorAll('.cart-item').forEach(function(item) {
            var checkbox = item.querySelector('.item-checkbox');
            if (checkbox && checkbox.checked) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
    }
    
    function deleteSelected() {
        var checkboxes = document.querySelectorAll('.item-checkbox:checked');
        if (checkboxes.length === 0) {
            alert('请先选择要删除的商品');
            return;
        }
        if (!confirm('确定删除选中的 ' + checkboxes.length + ' 件商品吗？')) {
            return;
        }
        
        var ids = [];
        checkboxes.forEach(function(cb) {
            ids.push(cb.value);
        });
        
        fetch('/cart/delete-selected', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'ids=' + ids.join(',')
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                location.reload();
            } else {
                alert(data.message);
            }
        })
        .catch(() => {
            alert('删除失败，请重试');
        });
    }
    
    function checkout() {
        var checkboxes = document.querySelectorAll('.item-checkbox:checked');
        if (checkboxes.length === 0) {
            alert('请先选择要结算的商品');
            return;
        }
        
        var ids = [];
        checkboxes.forEach(function(cb) {
            ids.push(cb.value);
        });
        
        window.location.href = '/checkout?ids=' + ids.join(',');
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        updateSelection();
    });
</script>
</body>
</html>
