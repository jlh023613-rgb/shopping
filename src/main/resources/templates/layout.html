<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网上商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/" style="color: #764ba2;">
            <i class="bi bi-shop me-2"></i>网上商城
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <form class="d-flex mx-auto" action="/" method="get" style="width: 400px; max-width: 100%;">
                <div class="input-group">
                    <input type="text" class="form-control" name="keyword" placeholder="搜索商品..." th:value="${keyword}">
                    <button class="btn btn-outline-primary" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
            <div class="d-flex align-items-center">
                <span sec:authorize="isAuthenticated()" class="d-flex align-items-center">
                    <a href="/cart" class="btn btn-outline-success btn-sm me-2 position-relative">
                        <i class="bi bi-cart3 me-1"></i>购物车
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge" style="display:none;">
                            0
                        </span>
                    </a>
                    <a href="/user/center" class="btn btn-outline-primary btn-sm me-2">
                        <i class="bi bi-person-circle me-1"></i>用户中心
                    </a>
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-link btn-sm text-decoration-none">退出</button>
                    </form>
                </span>
                <a sec:authorize="!isAuthenticated()" href="/user/login" class="btn btn-primary btn-sm">登录</a>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
        });
        
        function updateCartBadge() {
            var badge = document.querySelector('.cart-badge');
            if (!badge) return;
            
            fetch('/cart/count')
                .then(response => response.json())
                .then(data => {
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(() => {
                    badge.style.display = 'none';
                });
        }
    </script>
</div>

</body>
</html>
