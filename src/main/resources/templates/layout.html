<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>网上商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4400;
            --primary-dark: #E63E00;
            --primary-light: #FFF5F0;
            --bg: #F5F5F5;
            --border: #e8e8e8;
            --text-dark: #333;
            --text-secondary: #666;
            --text-muted: #999;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background-color: var(--bg); color: var(--text-dark); font-size: 14px; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }
        .text-primary { color: var(--primary) !important; }
        .bg-primary { background-color: var(--primary) !important; }
        .border-primary { border-color: var(--primary) !important; }
    </style>
</head>
<body>

<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-light bg-white sticky-top" style="border-bottom: 2px solid var(--primary); padding: 0;">
    <div class="container" style="height: 50px;">
        <a class="navbar-brand" href="/" style="color: var(--primary); font-weight: 700; font-size: 1.1rem; padding: 0;">
            网上商城
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="padding: 2px 6px;">
            <span class="navbar-toggler-icon" style="width: 18px; height: 18px;"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <form class="d-flex mx-auto" action="/" method="get" style="width: 440px; max-width: 100%;">
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control" name="keyword" placeholder="搜索商品..." th:value="${keyword}" style="border-color: var(--primary); border-right: none;">
                    <button class="btn text-white" type="submit" style="background-color: var(--primary); border-color: var(--primary); font-size: 13px;">
                        搜索
                    </button>
                </div>
            </form>
            <div class="d-flex align-items-center" style="font-size: 12px;">
                <span th:if="${user == null}">
                    <a href="/user/login" style="color: var(--primary);">登录</a>
                    <span class="text-muted mx-1">|</span>
                    <a href="/user/register" style="color: var(--primary);">注册</a>
                </span>
                <span th:if="${user != null}" class="d-flex align-items-center">
                    <a href="/cart" class="text-decoration-none me-3" style="color: var(--text-secondary);">
                        购物车<span class="cart-badge" style="display:none; background: var(--primary); color: white; font-size: 10px; padding: 0 4px; border-radius: 2px; margin-left: 2px; vertical-align: top;">0</span>
                    </a>
                    <a href="/user/center" class="text-decoration-none me-3" style="color: var(--text-secondary);">用户中心</a>
                    <a href="/user/orders" class="text-decoration-none me-3" style="color: var(--text-secondary);">我的订单</a>
                    <a href="/user/logout" style="color: var(--text-muted);">退出</a>
                </span>
                <span class="text-muted mx-2">|</span>
                <a href="/merchant/login" style="color: var(--text-muted);">商家</a>
                <span class="text-muted mx-1">|</span>
                <a href="/admin/login" style="color: var(--text-muted);">管理</a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" style="background: #333; color: #aaa; text-align: center; padding: 16px 0; margin-top: 40px; font-size: 12px;">
    <div class="container">
        &copy; 2024 网上商城 版权所有
    </div>
</footer>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            updateCartBadge();
        });
        
        function updateCartBadge() {
            var badge = document.querySelector('.cart-badge');
            if (!badge) return;
            
            fetch('/cart/count')
                .then(response => response.json())
                .then(data => {
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(() => {
                    badge.style.display = 'none';
                });
        }
    </script>
</div>

</body>
</html>
