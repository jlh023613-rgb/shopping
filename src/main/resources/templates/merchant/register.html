<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; }
        body { background: #F5F5F5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        .register-card { background: white; border-radius: 4px; padding: 2.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); max-width: 480px; width: 100%; border: 1px solid #e8e8e8; }
        .btn-register { background-color: var(--primary); color: white; border: none; border-radius: 4px; padding: 10px; font-weight: 600; }
        .btn-register:hover { background-color: var(--primary-dark); color: white; }
        .form-control { border-radius: 4px; padding: 0.6rem; font-size: 14px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(255,68,0,0.15); }
        .brand { color: var(--primary); font-weight: 700; text-align: center; margin-bottom: 0.5rem; font-size: 22px; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="brand">网上商城</div>
    <h3 class="text-center fw-bold mb-4" style="font-size: 20px;">商家注册</h3>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}" style="border-radius: 4px; font-size: 13px;"></div>
    <form method="post" action="/merchant/register" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">账号</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">密码</label>
            <input type="password" name="password" class="form-control" required minlength="6">
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">店铺名称</label>
            <input type="text" name="shopName" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">店铺描述</label>
            <textarea name="shopDescription" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">店铺图片（可选）</label>
            <input type="file" name="shopImage" class="form-control" accept="image/*">
        </div>
        <button type="submit" class="btn btn-register w-100 mb-3">注册</button>
        <div class="text-center" style="font-size: 13px;">
            <a href="/merchant/login" class="text-decoration-none" style="color: var(--primary);">已有账号？去登录</a>
        </div>
    </form>
</div>
</body>
</html>
