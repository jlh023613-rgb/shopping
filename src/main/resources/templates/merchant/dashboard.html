<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --primary: #58A6FF;
            --primary-glow: rgba(88, 166, 255, 0.3);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --success: #3FB950;
            --warning: #D29922;
            --danger: #F85149;
            --info: #58A6FF;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 13px;
            color: var(--text-white);
            margin: 0;
            min-height: 100vh;
        }
        .sidebar {
            background: var(--bg-card);
            width: 220px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid var(--border);
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .shop-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #1f6feb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .shop-info h5 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }
        .shop-info small {
            color: var(--text-gray);
            font-size: 11px;
        }
        .sidebar-nav {
            padding: 12px 0;
        }
        .nav-item {
            display: block;
            padding: 10px 16px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover {
            background: var(--bg-card-hover);
            color: var(--text-white);
        }
        .nav-item.active {
            background: rgba(88, 166, 255, 0.15);
            color: var(--text-white);
            border-left-color: var(--primary);
        }
        .nav-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        .nav-item.logout {
            color: var(--danger);
            margin-top: 20px;
        }
        .nav-item.logout:hover {
            background: rgba(248, 81, 73, 0.15);
        }
        .content-area {
            margin-left: 220px;
            padding: 24px;
            min-height: 100vh;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.blue::before { background: var(--primary); }
        .stat-card.green::before { background: var(--success); }
        .stat-card.orange::before { background: var(--warning); }
        .stat-card.red::before { background: var(--danger); }
        .stat-card:hover {
            box-shadow: 0 0 20px var(--primary-glow);
            border-color: var(--primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-white);
        }
        .stat-card.blue .stat-number { color: var(--primary); }
        .stat-card.green .stat-number { color: var(--success); }
        .stat-card.orange .stat-number { color: var(--warning); }
        .stat-card.red .stat-number { color: var(--danger); }
        .data-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .data-card-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            color: var(--text-white);
        }
        .table {
            margin-bottom: 0;
            font-size: 12px;
        }
        .table th {
            font-weight: 600;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            background: transparent;
        }
        .table td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
            color: var(--text-white);
        }
        .table tr:last-child td { border-bottom: none; }
        .table tbody tr:hover {
            background: var(--bg-card-hover);
        }
        .badge {
            font-size: 11px;
            font-weight: 500;
            border-radius: 4px;
            padding: 4px 10px;
        }
        .badge-pending { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .badge-shipping { background: rgba(88, 166, 255, 0.2); color: var(--primary); }
        .badge-delivered { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-completed { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-cancelled { background: rgba(110, 118, 129, 0.2); color: var(--text-muted); }
        .badge-refunded { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        .review-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        .review-item:last-child { border-bottom: none; }
        .review-username {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-white);
        }
        .review-stars { color: var(--warning); font-size: 12px; }
        .review-content {
            color: var(--text-gray);
            font-size: 12px;
            margin-top: 6px;
        }
        .review-date {
            color: var(--text-muted);
            font-size: 11px;
        }
        .table > :not(caption) > * > * { background-color: var(--bg-card) !important; color: var(--text-white) !important; border-color: var(--border) !important; }
        .table > thead > * > * { background-color: var(--bg-dark) !important; color: var(--primary) !important; }
        .table > tbody > tr:hover > * { background-color: var(--bg-card-hover) !important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="shop-avatar"><i class="bi bi-shop"></i></div>
        <div class="shop-info">
            <h5 th:text="${merchant.shopName}">店铺名称</h5>
            <small th:text="${merchant.category}">分类</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item active" href="/merchant/dashboard"><i class="bi bi-grid-1x2"></i>概览</a>
        <a class="nav-item" href="/merchant/products"><i class="bi bi-box"></i>商品管理</a>
        <a class="nav-item" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
        <a class="nav-item" href="/merchant/refunds"><i class="bi bi-arrow-counterclockwise"></i>退款管理</a>
        <a class="nav-item" href="/merchant/reviews"><i class="bi bi-chat-square-text"></i>评价管理</a>
        <a class="nav-item logout" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出登录</a>
    </nav>
</div>

<div class="content-area">
    <h1 class="page-title">店铺概览</h1>
    
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card blue">
                <div class="stat-label">商品总数</div>
                <div class="stat-number" th:text="${totalProducts}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card orange">
                <div class="stat-label">待接单</div>
                <div class="stat-number" th:text="${pendingOrders}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card blue">
                <div class="stat-label">运输中</div>
                <div class="stat-number" th:text="${shippingOrders}">0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card green">
                <div class="stat-label">已送达</div>
                <div class="stat-number" th:text="${deliveredOrders}">0</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="stat-card green">
                <div class="stat-label">订单总数</div>
                <div class="stat-number" th:text="${totalOrders}">0</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card red">
                <div class="stat-label">待处理退款</div>
                <div class="stat-number" th:text="${pendingRefunds}">0</div>
            </div>
        </div>
    </div>

    <div class="data-card mb-4">
        <div class="data-card-header">最近订单</div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>订单号</th>
                        <th>商品</th>
                        <th>金额</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderNo}"></td>
                        <td th:text="${order.productName}"></td>
                        <td th:text="'¥' + ${order.totalPrice}"></td>
                        <td>
                            <span class="badge badge-pending" th:if="${order.status == 'pending'}">等待接单</span>
                            <span class="badge badge-shipping" th:if="${order.status == 'shipping'}">运输中</span>
                            <span class="badge badge-delivered" th:if="${order.status == 'delivered'}">已送达</span>
                            <span class="badge badge-completed" th:if="${order.status == 'completed'}">已完成</span>
                            <span class="badge badge-cancelled" th:if="${order.status == 'cancelled'}">已取消</span>
                            <span class="badge badge-refunded" th:if="${order.status == 'refunded'}">已退款</span>
                        </td>
                        <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="data-card" th:if="${reviews != null and !reviews.isEmpty()}">
        <div class="data-card-header">最新评价</div>
        <div>
            <div th:each="review : ${reviews}" class="review-item">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <span class="review-username" th:text="${review.username}"></span>
                        <span class="review-stars ms-2">
                            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                        </span>
                        <p class="review-content mb-0" th:text="${review.content}"></p>
                    </div>
                    <span class="review-date" th:text="${#temporals.format(review.createdAt, 'MM-dd')}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
