<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: var(--primary); color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .data-card { background: white; border: 1px solid var(--border); border-radius: 4px; }
        .data-card .card-body { padding: 0; }
        .table { margin-bottom: 0; font-size: 12px; }
        .table th { font-weight: 600; color: var(--text-secondary); border-bottom-width: 1px; padding: 8px 12px; background: #fafafa; }
        .table td { padding: 8px 12px; vertical-align: middle; }
        .btn-add { background: var(--primary); color: white; border: none; border-radius: 2px; font-size: 12px; padding: 6px 14px; font-weight: 600; }
        .btn-add:hover { background: var(--primary-dark); color: white; }
        .btn-edit { border: 1px solid var(--primary); color: var(--primary); border-radius: 2px; font-size: 11px; padding: 3px 10px; background: white; }
        .btn-edit:hover { background: var(--primary-light); color: var(--primary); }
        .btn-del { border: 1px solid #C62828; color: #C62828; border-radius: 2px; font-size: 11px; padding: 3px 10px; background: white; }
        .btn-del:hover { background: #FFEBEE; color: #C62828; }
        .product-img { width: 40px; height: 40px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; background: #fafafa; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5 th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard">概览</a>
                <a class="nav-link active" href="/merchant/products">商品管理</a>
                <a class="nav-link" href="/merchant/orders">订单管理</a>
                <a class="nav-link" href="/merchant/refunds">退款管理</a>
                <a class="nav-link" href="/merchant/reviews">评价管理</a>
                <a class="nav-link" href="/merchant/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="page-title mb-0 pb-0 border-0">商品管理</div>
                <a href="/merchant/product/add" class="btn-add">+ 添加商品</a>
            </div>
            <div class="data-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                            <tr><th>ID</th><th>图片</th><th>名称</th><th>价格</th><th>库存</th><th>操作</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${products}">
                                <td th:text="${p.id}"></td>
                                <td>
                                    <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" class="product-img">
                                </td>
                                <td th:text="${p.name}"></td>
                                <td style="color:var(--primary);font-weight:600" th:text="'¥' + ${p.price}"></td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <a th:href="@{/merchant/product/edit/{id}(id=${p.id})}" class="btn-edit">编辑</a>
                                    <form th:action="@{/merchant/product/delete/{id}(id=${p.id})}" method="post" style="display:inline;" onsubmit="return confirm('确定删除？')">
                                        <button type="submit" class="btn-del">删除</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${products == null or products.isEmpty()}">
                                <td colspan="6" class="text-center text-secondary py-4">暂无商品</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
