<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>评价管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: var(--primary); color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .review-card { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        .review-card .review-body { padding: 12px 14px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .review-username { font-weight: 600; font-size: 13px; }
        .review-stars { color: var(--primary); font-size: 12px; margin-left: 6px; }
        .review-product { color: var(--text-muted); font-size: 11px; margin-left: 8px; }
        .review-date { color: var(--text-muted); font-size: 11px; }
        .review-content { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }
        .reply-box { background: var(--primary-light); border: 1px solid #FFCCBC; border-radius: 2px; padding: 8px 10px; margin-top: 8px; font-size: 12px; }
        .reply-label { color: var(--primary); font-weight: 600; font-size: 11px; }
        .reply-text { color: var(--text-secondary); }
        .reply-form { margin-top: 8px; }
        .reply-input { border-radius: 2px; border: 1px solid var(--border); font-size: 12px; padding: 6px 10px; }
        .reply-input:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); outline: none; }
        .btn-reply { background: var(--primary); color: white; border: none; border-radius: 2px; font-size: 11px; padding: 6px 12px; font-weight: 500; }
        .btn-reply:hover { background: var(--primary-dark); color: white; }
        .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5 th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard">概览</a>
                <a class="nav-link" href="/merchant/products">商品管理</a>
                <a class="nav-link" href="/merchant/orders">订单管理</a>
                <a class="nav-link" href="/merchant/refunds">退款管理</a>
                <a class="nav-link active" href="/merchant/reviews">评价管理</a>
                <a class="nav-link" href="/merchant/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="page-title">评价管理</div>

            <div th:if="${reviews == null or reviews.isEmpty()}" class="empty-state">
                <p>暂无评价</p>
            </div>

            <div th:each="review : ${reviews}" class="review-card">
                <div class="review-body">
                    <div class="review-header">
                        <div>
                            <span class="review-username" th:text="${review.username}"></span>
                            <span class="review-stars">
                                <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                            </span>
                            <span class="review-product" th:text="${review.productName}"></span>
                        </div>
                        <span class="review-date" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></span>
                    </div>
                    <div class="review-content" th:text="${review.content}"></div>
                    <div th:if="${review.merchantReply != null}" class="reply-box">
                        <span class="reply-label">商家回复：</span>
                        <span class="reply-text" th:text="${review.merchantReply}"></span>
                    </div>
                    <form th:if="${review.merchantReply == null}" th:action="@{/merchant/review/reply/{id}(id=${review.id})}" method="post" class="reply-form">
                        <div style="display:flex;gap:6px">
                            <input type="text" name="merchantReply" class="reply-input" style="flex:1" placeholder="回复评价..." required>
                            <button type="submit" class="btn-reply">回复</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
