<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>编辑商品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: var(--primary); color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .form-card { background: white; border: 1px solid var(--border); border-radius: 4px; }
        .form-card .card-body { padding: 20px; }
        .form-label { font-weight: 600; font-size: 12px; color: var(--text-dark); margin-bottom: 4px; }
        .form-control { border-radius: 2px; border: 1px solid var(--border); font-size: 12px; padding: 6px 10px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); }
        .btn-save { background: var(--primary); color: white; border: none; border-radius: 2px; font-size: 12px; padding: 6px 16px; font-weight: 600; }
        .btn-save:hover { background: var(--primary-dark); color: white; }
        .btn-back { background: white; color: var(--text-secondary); border: 1px solid var(--border); border-radius: 2px; font-size: 12px; padding: 6px 16px; }
        .btn-back:hover { background: #fafafa; color: var(--text-dark); }
        .current-img { max-width: 120px; max-height: 120px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; background: #fafafa; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5 th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard">概览</a>
                <a class="nav-link active" href="/merchant/products">商品管理</a>
                <a class="nav-link" href="/merchant/orders">订单管理</a>
                <a class="nav-link" href="/merchant/refunds">退款管理</a>
                <a class="nav-link" href="/merchant/reviews">评价管理</a>
                <a class="nav-link" href="/merchant/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="page-title">编辑商品</div>
            <div class="form-card">
                <div class="card-body">
                    <form method="post" th:action="@{/merchant/product/edit/{id}(id=${product.id})}" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">商品名称</label>
                            <input type="text" name="name" class="form-control" th:value="${product.name}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">价格</label>
                                <input type="number" name="price" class="form-control" step="0.01" th:value="${product.price}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">原价</label>
                                <input type="number" name="originalPrice" class="form-control" step="0.01" th:value="${product.originalPrice}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">库存</label>
                            <input type="number" name="stock" class="form-control" th:value="${product.stock}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">商品描述</label>
                            <textarea name="description" class="form-control" rows="3" th:text="${product.description}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">当前图片</label>
                            <div th:if="${product.imageUrl != null}">
                                <img th:src="${product.imageUrl}" class="current-img">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">更换图片</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*">
                        </div>
                        <div>
                            <button type="submit" class="btn-save">保存修改</button>
                            <a href="/merchant/products" class="btn-back ms-2">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
