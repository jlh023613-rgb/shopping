<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: var(--primary); color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .order-card { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 8px 14px; background: #fafafa; }
        .order-body { padding: 12px 14px; display: flex; align-items: center; }
        .order-img { width: 60px; height: 60px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; margin-right: 12px; background: #fafafa; }
        .badge { font-size: 11px; font-weight: 500; border-radius: 2px; padding: 3px 8px; }
        .badge-pending { background: #FFF3E0; color: #E65100; }
        .badge-shipping { background: #E3F2FD; color: #1565C0; }
        .badge-delivered { background: #E8F5E9; color: #2E7D32; }
        .badge-completed { background: #E8F5E9; color: #1B5E20; }
        .badge-cancelled { background: #F5F5F5; color: #757575; }
        .badge-refunded { background: #FCE4EC; color: #C62828; }
        .btn-action { border-radius: 2px; font-size: 11px; padding: 4px 12px; font-weight: 500; }
        .btn-accept { background: #2E7D32; color: white; border: none; }
        .btn-accept:hover { background: #1B5E20; color: white; }
        .btn-deliver { background: var(--primary); color: white; border: none; }
        .btn-deliver:hover { background: var(--primary-dark); color: white; }
        .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); }
        .empty-state .icon { font-size: 36px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5 th:text="${merchant.shopName}">店铺名称</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/merchant/dashboard">概览</a>
                <a class="nav-link" href="/merchant/products">商品管理</a>
                <a class="nav-link active" href="/merchant/orders">订单管理</a>
                <a class="nav-link" href="/merchant/refunds">退款管理</a>
                <a class="nav-link" href="/merchant/reviews">评价管理</a>
                <a class="nav-link" href="/merchant/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="page-title">订单管理</div>

            <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
                <div class="icon">📋</div>
                <p>暂无订单</p>
            </div>

            <div th:each="order : ${orders}" class="order-card">
                <div class="order-header">
                    <div>
                        <span style="color:var(--text-muted);font-size:11px">订单号：</span>
                        <span style="font-weight:600;font-size:12px" th:text="${order.orderNo}"></span>
                        <span style="color:var(--text-muted);font-size:11px;margin-left:12px" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <div>
                        <span class="badge badge-pending" th:if="${order.status == 'pending'}">等待接单</span>
                        <span class="badge badge-shipping" th:if="${order.status == 'shipping'}">运输中</span>
                        <span class="badge badge-delivered" th:if="${order.status == 'delivered'}">已送达</span>
                        <span class="badge badge-completed" th:if="${order.status == 'completed'}">已完成</span>
                        <span class="badge badge-cancelled" th:if="${order.status == 'cancelled'}">已取消</span>
                        <span class="badge badge-refunded" th:if="${order.status == 'refunded'}">已退款</span>
                    </div>
                </div>
                <div class="order-body">
                    <img th:if="${order.productImage != null}" th:src="${order.productImage}" class="order-img">
                    <div class="flex-grow-1">
                        <div style="font-weight:600;font-size:13px" th:text="${order.productName}"></div>
                        <div style="color:var(--text-muted);font-size:11px;margin-top:2px">买家：<span th:text="${order.username}"></span></div>
                        <div style="margin-top:4px">
                            <span style="color:var(--primary);font-weight:700" th:text="'¥' + ${order.totalPrice}"></span>
                            <span style="color:var(--text-muted);font-size:11px;margin-left:6px" th:text="'x' + ${order.quantity}"></span>
                        </div>
                        <div style="color:var(--text-muted);font-size:11px;margin-top:2px" th:text="${order.receiverAddress}"></div>
                        <div style="color:var(--text-muted);font-size:11px" th:text="${order.receiverName} + ' ' + ${order.receiverPhone}"></div>
                    </div>
                    <div>
                        <form th:if="${order.status == 'pending'}" th:action="@{/merchant/order/accept/{id}(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-action btn-accept">接单</button>
                        </form>
                        <form th:if="${order.status == 'shipping'}" th:action="@{/merchant/order/deliver/{id}(id=${order.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn-action btn-deliver">确认送达</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
