<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --primary: #58A6FF;
            --primary-glow: rgba(88, 166, 255, 0.3);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --success: #3FB950;
            --warning: #D29922;
            --danger: #F85149;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg-dark); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-white); margin: 0; min-height: 100vh; }
        .sidebar { background: var(--bg-card); width: 220px; min-height: 100vh; position: fixed; left: 0; top: 0; border-right: 1px solid var(--border); }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .shop-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary) 0%, #1f6feb 100%); display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
        .shop-info h5 { margin: 0; font-size: 14px; font-weight: 600; color: var(--primary); }
        .sidebar-nav { padding: 12px 0; }
        .nav-item { display: block; padding: 10px 16px; color: var(--text-gray); text-decoration: none; font-size: 13px; border-left: 3px solid transparent; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: var(--bg-card-hover); color: var(--text-white); }
        .nav-item.active { background: rgba(88, 166, 255, 0.15); color: var(--text-white); border-left-color: var(--primary); }
        .nav-item i { font-size: 16px; width: 20px; text-align: center; }
        .nav-item.logout { color: var(--danger); margin-top: 20px; }
        .nav-item.logout:hover { background: rgba(248, 81, 73, 0.15); }
        .content-area { margin-left: 220px; padding: 24px; min-height: 100vh; }
        .page-title { font-size: 20px; font-weight: 600; color: var(--text-white); margin-bottom: 24px; }
        .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; transition: all 0.2s; }
        .order-card:hover { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 12px 16px; background: var(--bg-card-hover); }
        .order-body { padding: 16px; display: flex; align-items: center; }
        .order-img { width: 70px; height: 70px; object-fit: contain; border: 1px solid var(--border); border-radius: 6px; margin-right: 16px; background: var(--bg-card-hover); }
        .badge { font-size: 11px; font-weight: 500; border-radius: 4px; padding: 4px 10px; }
        .badge-pending { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .badge-shipping { background: rgba(88, 166, 255, 0.2); color: var(--primary); }
        .badge-delivered { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-completed { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-cancelled { background: rgba(110, 118, 129, 0.2); color: var(--text-muted); }
        .badge-refunded { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        .btn-action { border-radius: 6px; font-size: 12px; padding: 6px 16px; font-weight: 500; transition: all 0.2s; }
        .btn-accept { background: var(--success); color: white; border: none; }
        .btn-accept:hover { background: #2ea043; color: white; box-shadow: 0 0 10px rgba(63, 185, 80, 0.4); }
        .btn-deliver { background: var(--primary); color: white; border: none; }
        .btn-deliver:hover { background: #1f6feb; color: white; box-shadow: 0 0 10px var(--primary-glow); }
        .empty-state { text-align: center; padding: 60px 0; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .order-no { color: var(--primary); font-weight: 600; }
        .price { color: var(--primary); font-weight: 700; font-size: 16px; }
        .info-text { color: var(--text-gray); font-size: 12px; }
        .table > :not(caption) > * > * { background-color: var(--bg-card) !important; color: var(--text-white) !important; border-color: var(--border) !important; }
        .table > thead > * > * { background-color: var(--bg-dark) !important; color: var(--primary) !important; }
        .table > tbody > tr:hover > * { background-color: var(--bg-card-hover) !important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <div class="shop-avatar"><i class="bi bi-shop"></i></div>
        <div class="shop-info">
            <h5 th:text="${merchant.shopName}">店铺名称</h5>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="/merchant/dashboard"><i class="bi bi-grid-1x2"></i>概览</a>
        <a class="nav-item" href="/merchant/products"><i class="bi bi-box"></i>商品管理</a>
        <a class="nav-item active" href="/merchant/orders"><i class="bi bi-receipt"></i>订单管理</a>
        <a class="nav-item" href="/merchant/refunds"><i class="bi bi-arrow-counterclockwise"></i>退款管理</a>
        <a class="nav-item" href="/merchant/reviews"><i class="bi bi-chat-square-text"></i>评价管理</a>
        <a class="nav-item logout" href="/merchant/logout"><i class="bi bi-box-arrow-left"></i>退出登录</a>
    </nav>
</div>

<div class="content-area">
    <h1 class="page-title">订单管理</h1>

    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
        <i class="bi bi-inbox"></i>
        <p>暂无订单</p>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <div>
                <span style="color: var(--text-muted); font-size: 11px;">订单号：</span>
                <span class="order-no" th:text="${order.orderNo}"></span>
                <span style="color: var(--text-muted); font-size: 11px; margin-left: 16px;" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div>
                <span class="badge badge-pending" th:if="${order.status == 'pending'}">等待接单</span>
                <span class="badge badge-shipping" th:if="${order.status == 'shipping'}">运输中</span>
                <span class="badge badge-delivered" th:if="${order.status == 'delivered'}">已送达</span>
                <span class="badge badge-completed" th:if="${order.status == 'completed'}">已完成</span>
                <span class="badge badge-cancelled" th:if="${order.status == 'cancelled'}">已取消</span>
                <span class="badge badge-refunded" th:if="${order.status == 'refunded'}">已退款</span>
            </div>
        </div>
        <div class="order-body">
            <img th:if="${order.productImage != null}" th:src="${order.productImage}" class="order-img">
            <div class="flex-grow-1">
                <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px;" th:text="${order.productName}"></div>
                <div class="info-text">买家：<span th:text="${order.username}"></span></div>
                <div class="mt-1">
                    <span class="price" th:text="'¥' + ${order.totalPrice}"></span>
                    <span class="info-text" style="margin-left: 8px;" th:text="'x' + ${order.quantity}"></span>
                </div>
                <div class="info-text mt-1" th:text="${order.receiverAddress}"></div>
                <div class="info-text" th:text="${order.receiverName} + ' ' + ${order.receiverPhone}"></div>
            </div>
            <div>
                <form th:if="${order.status == 'pending'}" th:action="@{/merchant/order/accept/{id}(id=${order.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn-action btn-accept">接单</button>
                </form>
                <form th:if="${order.status == 'shipping'}" th:action="@{/merchant/order/deliver/{id}(id=${order.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn-action btn-deliver">确认送达</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
