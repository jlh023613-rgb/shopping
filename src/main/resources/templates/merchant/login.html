<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>商家登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
            background: #1a1a2e;
        }
        .bg-flow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(-45deg, #1a1a2e, #e4393c, #1a1a2e, #e4393c, #1a1a2e);
            background-size: 400% 400%;
            animation: flowBg 12s ease infinite;
        }
        @keyframes flowBg {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        .bg-flow::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(228,57,60,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(26,26,46,0.3) 0%, transparent 50%);
        }
        .brand {
            position: relative;
            z-index: 10;
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 2px 20px rgba(228,57,60,0.5);
            letter-spacing: 4px;
        }
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 60px rgba(228,57,60,0.1);
        }
        .role-badge {
            position: absolute;
            top: -12px;
            right: 24px;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(34,197,94,0.4);
            letter-spacing: 1px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 28px;
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            display: block;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
            padding: 14px 16px;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: none;
            border-bottom-color: #e4393c;
            color: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #e4393c 0%, #c81623 100%);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(228,57,60,0.4);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(228,57,60,0.6);
            color: white;
        }
        .alert {
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }
        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .register-link {
            color: #e4393c;
            font-weight: 500;
            text-decoration: none;
        }
        .register-link:hover { text-decoration: underline; color: #ff6b6b; }
    </style>
</head>
<body>
<div class="bg-flow"></div>
<div class="brand">网上商城</div>
<div class="login-card">
    <div class="role-badge">商家</div>
    <h3 class="login-title">商家登录</h3>

    <div th:if="${param.error}" class="alert">
        账号或密码错误
    </div>
    <div th:if="${param.pending}" class="alert">
        账号待审核，请等待管理员审核通过
    </div>
    <div th:if="${param.closed}" class="alert">
        店铺已被关停，无法登录
    </div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form method="post" action="/merchant/login">
        <div class="form-group">
            <label class="form-label">账号</label>
            <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-login">登录</button>
    </form>

    <div class="links">
        没有账号？<a href="/merchant/register" class="register-link">去注册</a>
    </div>
</div>
</body>
</html>
