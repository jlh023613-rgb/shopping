<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<style>
    .detail-card { background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .main-img-wrap { 
        background: #fff; 
        border-radius: 4px; 
        overflow: hidden; 
        min-height: 400px; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        position: relative;
        padding: 30px;
    }
    .main-img-wrap img { 
        max-width: 100%; 
        max-height: 360px; 
        width: auto;
        height: auto;
        object-fit: contain; 
        transition: opacity 0.3s ease; 
    }
    
    .img-nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255,255,255,0.9);
        border: 1px solid var(--border);
        width: 32px;
        height: 32px;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        color: #333;
        font-size: 14px;
        transition: all 0.15s;
    }
    .img-nav-btn:hover { background: #fff; border-color: var(--primary); color: var(--primary); }
    .img-nav-prev { left: 10px; }
    .img-nav-next { right: 10px; }
    
    .img-counter {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: rgba(0,0,0,0.5);
        color: white;
        padding: 2px 8px;
        border-radius: 2px;
        font-size: 12px;
    }
    
    .thumb-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .thumb-item { 
        width: 60px; 
        height: 60px; 
        border-radius: 2px; 
        overflow: hidden; 
        border: 2px solid var(--border); 
        cursor: pointer; 
        flex-shrink: 0; 
        transition: all 0.15s;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px;
    }
    .thumb-item:hover, .thumb-item.active { border-color: var(--primary); }
    .thumb-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .product-price { font-size: 24px; color: var(--primary); font-weight: 700; }
    .original-price { color: var(--text-muted); text-decoration: line-through; font-size: 14px; }
    .shop-card { background: #f8f8f8; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
    .btn-add-cart { background-color: var(--primary); color: white; border: none; padding: 8px 24px; border-radius: 2px; font-weight: 600; font-size: 14px; }
    .btn-add-cart:hover { background-color: var(--primary-dark); color: white; }
    .btn-buy-now { background-color: #ff6600; color: white; border: none; padding: 8px 24px; border-radius: 2px; font-weight: 600; font-size: 14px; }
    .btn-buy-now:hover { background-color: #e65c00; color: white; }
    .stock-info { color: var(--text-secondary); font-size: 13px; }
    
    .info-tag { 
        display: inline-block; 
        background: #f8f8f8; 
        border: 1px solid var(--border);
        border-radius: 2px; 
        padding: 3px 8px; 
        margin: 2px; 
        font-size: 12px;
        color: var(--text-secondary);
    }
    
    .spec-table { width: 100%; }
    .spec-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .spec-table td:first-child { 
        width: 100px; 
        color: var(--text-muted); 
        background: #f8f8f8;
        font-weight: 500;
    }
    .spec-table td:last-child { color: var(--text-dark); }
    
    .feature-item {
        position: relative;
        padding-left: 16px;
        margin-bottom: 6px;
        color: var(--text-secondary);
        line-height: 1.6;
        font-size: 13px;
    }
    .feature-item::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: var(--primary);
        font-weight: bold;
    }
    
    .packaging-item {
        position: relative;
        padding-left: 14px;
        margin-bottom: 4px;
        color: var(--text-muted);
        font-size: 13px;
        line-height: 1.8;
    }
    .packaging-item::before {
        content: '•';
        position: absolute;
        left: 0;
        color: var(--primary);
    }
    
    .section-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-dark);
        padding-bottom: 6px;
        border-bottom: 2px solid var(--primary);
        margin-bottom: 12px;
    }
    
    .detail-tabs .nav-link {
        color: var(--text-muted);
        border: none;
        padding: 10px 20px;
        font-weight: 500;
        font-size: 13px;
    }
    .detail-tabs .nav-link.active {
        color: var(--primary);
        border-bottom: 2px solid var(--primary);
        background: transparent;
    }
    .detail-tabs .nav-link:hover {
        color: var(--primary);
    }
    
    .option-section { margin-bottom: 16px; }
    .option-label { font-weight: 600; color: var(--text-dark); margin-bottom: 8px; font-size: 13px; }
    .option-btn {
        display: inline-block;
        padding: 5px 14px;
        margin: 3px;
        border: 1px solid var(--border);
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.15s;
        background: white;
        font-size: 13px;
    }
    .option-btn:hover { border-color: var(--primary); color: var(--primary); }
    .option-btn.selected { 
        border-color: var(--primary); 
        background: var(--primary-light);
        color: var(--primary);
    }
    .option-btn .price-add {
        font-size: 11px;
        color: var(--primary);
        margin-left: 2px;
    }
    .option-btn.selected .price-add { color: var(--primary); }
    
    .modal-price { font-size: 20px; color: var(--primary); font-weight: 700; }
    .price-breakdown { font-size: 12px; color: var(--text-muted); }
</style>

<nav th:replace="~{layout :: nav}"></nav>

<main class="container py-3" th:if="${product != null}">
    <div class="row g-3">
        <div class="col-lg-5">
            <div class="detail-card p-3">
                <div class="main-img-wrap" id="mainImgWrap">
                    <img th:if="${!imageUrls.isEmpty()}" id="mainImg" th:src="${imageUrls[0]}" alt="商品图片">
                    <img th:if="${imageUrls.isEmpty() and product.imageUrl != null}" id="mainImg" th:src="${product.imageUrl}" alt="商品图片">
                    <div th:if="${imageUrls.isEmpty() and product.imageUrl == null}" class="text-secondary text-center py-5">
                        <div style="font-size: 3rem;">📷</div>
                        <div class="mt-2" style="font-size: 13px;">暂无图片</div>
                    </div>
                    
                    <th:block th:if="${imageUrls != null and imageUrls.size() > 1}">
                        <button type="button" class="img-nav-btn img-nav-prev" onclick="prevImage()">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                        <button type="button" class="img-nav-btn img-nav-next" onclick="nextImage()">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                        <div class="img-counter">
                            <span id="currentIndex">1</span> / <span th:text="${imageUrls.size()}">1</span>
                        </div>
                    </th:block>
                </div>
                <div class="thumb-list" th:if="${imageUrls != null and imageUrls.size() > 1}">
                    <div th:each="url, stat : ${imageUrls}" class="thumb-item" th:classappend="${stat.index == 0} ? 'active'" th:attr="data-index=${stat.index},data-src=${url}" onclick="setMain(this)">
                        <img th:src="${url}" alt="缩略图">
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="detail-card p-3">
                <h1 class="h5 fw-bold mb-2" th:text="${product.name}">商品名称</h1>
                
                <div class="mb-2" th:if="${product.brand != null or product.model != null}">
                    <span class="info-tag" th:if="${product.brand != null}" th:text="${product.brand}">品牌</span>
                    <span class="info-tag" th:if="${product.model != null}" th:text="${product.model}">型号</span>
                    <span class="info-tag" th:if="${product.color != null}" th:text="${product.color}">颜色</span>
                </div>
                
                <div class="d-flex align-items-baseline gap-2 mb-2">
                    <span class="product-price" th:text="'¥' + ${product.price}">¥0.00</span>
                    <span th:if="${product.originalPrice != null and product.originalPrice > product.price}" class="original-price" th:text="'¥' + ${product.originalPrice}">¥0.00</span>
                    <span th:if="${product.originalPrice != null and product.originalPrice > product.price}" class="badge" style="background: var(--primary); font-size: 11px;">直降 <span th:text="${#numbers.formatDecimal((product.originalPrice - product.price), 1, 0)}">0</span>元</span>
                </div>
                
                <div class="stock-info mb-2">
                    <span th:if="${product.stock != null and product.stock > 0}">
                        有货，库存：<span th:text="${product.stock}">0</span> 件
                    </span>
                    <span th:unless="${product.stock != null and product.stock > 0}" style="color: var(--primary);">
                        暂无库存
                    </span>
                </div>
                
                <div th:if="${shop != null}" class="shop-card mb-3">
                    <div class="d-flex align-items-center">
                        <div>
                            <span class="fw-bold" style="font-size: 13px;" th:text="${shop.name}">店铺名称</span>
                            <span th:if="${shop.description != null}" class="text-secondary d-block" style="font-size: 12px;" th:text="${shop.description}">店铺描述</span>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex align-items-center gap-2 mb-3">
                    <label class="text-secondary" style="font-size: 13px;">数量：</label>
                    <div class="input-group input-group-sm" style="width: 120px;">
                        <button class="btn btn-outline-secondary" type="button" onclick="changeQty(-1)">-</button>
                        <input type="number" id="quantityInput" value="1" min="1" th:max="${product.stock != null ? product.stock : 99}" class="form-control text-center">
                        <button class="btn btn-outline-secondary" type="button" onclick="changeQty(1)">+</button>
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button th:if="${user != null and product.stock != null and product.stock > 0}" type="button" class="btn btn-add-cart" data-bs-toggle="modal" data-bs-target="#cartModal">
                        加入购物车
                    </button>
                    <button th:if="${user != null and (product.stock == null or product.stock <= 0)}" type="button" class="btn btn-add-cart disabled" disabled>
                        已售罄
                    </button>
                    <button th:if="${user != null and product.stock != null and product.stock > 0}" type="button" class="btn btn-buy-now" onclick="buyNow()">
                        立即购买
                    </button>
                    <button th:if="${user != null and (product.stock == null or product.stock <= 0)}" type="button" class="btn btn-buy-now disabled" disabled>
                        已售罄
                    </button>
                    <a th:if="${user == null}" href="/user/login" class="btn btn-add-cart">
                        登录后购买
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row g-3 mt-1">
        <div class="col-12">
            <div class="detail-card p-3">
                <ul class="nav nav-tabs detail-tabs" id="detailTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="spec-tab" data-bs-toggle="tab" data-bs-target="#spec" type="button">规格参数</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="feature-tab" data-bs-toggle="tab" data-bs-target="#feature" type="button">产品特点</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="packaging-tab" data-bs-toggle="tab" data-bs-target="#packaging" type="button">包装清单</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="review-tab" data-bs-toggle="tab" data-bs-target="#review" type="button">
                            用户评价 <span class="badge bg-secondary" th:if="${reviewCount != null}" th:text="${reviewCount}" style="font-size: 11px;">0</span>
                        </button>
                    </li>
                </ul>
                <div class="tab-content pt-3" id="detailTabContent">
                    <div class="tab-pane fade show active" id="spec" role="tabpanel">
                        <div id="specContent"></div>
                        <div id="specEmpty" class="text-center text-secondary py-4" style="display:none; font-size: 13px;">
                            暂无规格参数
                        </div>
                    </div>
                    <div class="tab-pane fade" id="feature" role="tabpanel">
                        <div id="featureContent"></div>
                        <div id="featureEmpty" class="text-center text-secondary py-4" style="display:none; font-size: 13px;">
                            暂无产品特点
                        </div>
                    </div>
                    <div class="tab-pane fade" id="packaging" role="tabpanel">
                        <div id="packagingContent"></div>
                        <div id="packagingEmpty" class="text-center text-secondary py-4" style="display:none; font-size: 13px;">
                            暂无包装清单
                        </div>
                    </div>
                    <div class="tab-pane fade" id="review" role="tabpanel">
                        <div th:if="${avgRating != null}" class="d-flex align-items-center mb-3">
                            <span class="text-warning fs-5 me-2">
                                <span th:each="i : ${#numbers.sequence(1, avgRating.intValue())}">★</span>
                            </span>
                            <span class="fw-bold" th:text="${#numbers.formatDecimal(avgRating, 1, 1)}">0.0</span>
                            <span class="text-secondary ms-2" style="font-size: 13px;">平均评分</span>
                        </div>
                        <div th:if="${reviews != null and !reviews.isEmpty()}">
                            <div th:each="review : ${reviews}" class="border-bottom pb-3 mb-3">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <strong th:text="${review.username}" style="font-size: 13px;"></strong>
                                        <span class="text-warning ms-2" style="font-size: 12px;">
                                            <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                                        </span>
                                    </div>
                                    <small class="text-muted" style="font-size: 12px;" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd')}"></small>
                                </div>
                                <p class="mb-1 mt-1" style="font-size: 13px;" th:text="${review.content}"></p>
                                <div th:if="${review.merchantReply != null}" class="bg-light rounded p-2 mt-1" style="font-size: 12px;">
                                    <span style="color: var(--primary); font-weight: 600;">商家回复：</span>
                                    <span th:text="${review.merchantReply}"></span>
                                </div>
                            </div>
                        </div>
                        <div th:if="${reviews == null or reviews.isEmpty()}" class="text-center text-secondary py-4" style="font-size: 13px;">
                            暂无评价
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 4px;">
            <div class="modal-header" style="border-bottom: 1px solid var(--border);">
                <h5 class="modal-title" style="font-size: 15px;">选择商品选项</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="cartForm" th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                    <input type="hidden" name="quantity" id="modalQtyInput" value="1">
                    
                    <div class="option-section" id="colorSection">
                        <div class="option-label">颜色</div>
                        <div id="colorOptions"></div>
                    </div>
                    
                    <div class="option-section" id="storageSection">
                        <div class="option-label">存储容量</div>
                        <div id="storageOptions"></div>
                    </div>
                    
                    <div class="option-section">
                        <div class="option-label">保障服务</div>
                        <div id="insuranceOptions">
                            <span class="option-btn selected" data-value="none" data-price="0" onclick="selectInsurance(this)">
                                不需要保障
                            </span>
                            <span class="option-btn" data-value="basic" onclick="selectInsurance(this)">
                                基础保障<span class="price-add" id="basicPrice"></span>
                            </span>
                            <span class="option-btn" data-value="premium" onclick="selectInsurance(this)">
                                坏了直接换新<span class="price-add" id="premiumPrice"></span>
                            </span>
                        </div>
                    </div>
                    
                    <input type="hidden" name="selectedColor" id="selectedColorInput">
                    <input type="hidden" name="selectedStorage" id="selectedStorageInput">
                    <input type="hidden" name="insuranceType" id="insuranceTypeInput" value="none">
                </form>
                
                <hr style="border-color: var(--border);">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="price-breakdown" id="priceBreakdown"></span>
                    </div>
                    <div>
                        <span style="font-size: 13px; color: var(--text-muted);">合计：</span>
                        <span class="modal-price">¥<span id="totalPrice">0.00</span></span>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="border-top: 1px solid var(--border);">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal" style="border-radius: 2px;">取消</button>
                <button type="button" class="btn btn-sm btn-add-cart" onclick="submitCart()">加入购物车</button>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script th:inline="javascript">
    var productPrice = /*[[${product.price}]]*/ 0;
    var productColor = /*[[${product.color}]]*/ '';
    var specifications = /*[[${product.specifications}]]*/ '';
    var features = /*[[${product.features}]]*/ '';
    var packagingList = /*[[${product.packagingList}]]*/ '';
    
    var selectedColor = '';
    var selectedStorage = '';
    var selectedInsurance = 'none';
    var insurancePrice = 0;
    
    document.addEventListener('DOMContentLoaded', function() {
        initOptions();
        renderSpecifications();
        renderFeatures();
        renderPackaging();
        updateTotalPrice();
    });
    
    function buyNow() {
        var qty = document.getElementById('quantityInput').value;
        var productId = /*[[${product.id}]]*/ 0;
        window.location.href = '/user/order/create?productId=' + productId + '&quantity=' + qty;
    }
    
    function initOptions() {
        if (productColor) {
            var colors = productColor.split('/');
            var colorHtml = '';
            colors.forEach(function(color, index) {
                var isSelected = index === 0 ? 'selected' : '';
                colorHtml += '<span class="option-btn ' + isSelected + '" data-value="' + color + '" onclick="selectColor(this)">' + color + '</span>';
            });
            document.getElementById('colorOptions').innerHTML = colorHtml;
            selectedColor = colors[0];
            document.getElementById('selectedColorInput').value = selectedColor;
        } else {
            document.getElementById('colorSection').style.display = 'none';
        }
        
        if (specifications) {
            try {
                var spec = JSON.parse(specifications);
                var storage = spec['存储'] || spec['容量'] || spec['内存'] || spec['存储容量'];
                if (storage) {
                    var storages = storage.split('/');
                    var storageHtml = '';
                    storages.forEach(function(s, index) {
                        var isSelected = index === 0 ? 'selected' : '';
                        storageHtml += '<span class="option-btn ' + isSelected + '" data-value="' + s + '" onclick="selectStorage(this)">' + s + '</span>';
                    });
                    document.getElementById('storageOptions').innerHTML = storageHtml;
                    selectedStorage = storages[0];
                    document.getElementById('selectedStorageInput').value = selectedStorage;
                } else {
                    document.getElementById('storageSection').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('storageSection').style.display = 'none';
            }
        } else {
            document.getElementById('storageSection').style.display = 'none';
        }
        
        var basicPrice = (productPrice * 0.05).toFixed(0);
        var premiumPrice = (productPrice * 0.10).toFixed(0);
        document.getElementById('basicPrice').innerText = '+¥' + basicPrice;
        document.getElementById('premiumPrice').innerText = '+¥' + premiumPrice;
    }
    
    function selectColor(el) {
        document.querySelectorAll('#colorOptions .option-btn').forEach(function(btn) {
            btn.classList.remove('selected');
        });
        el.classList.add('selected');
        selectedColor = el.getAttribute('data-value');
        document.getElementById('selectedColorInput').value = selectedColor;
    }
    
    function selectStorage(el) {
        document.querySelectorAll('#storageOptions .option-btn').forEach(function(btn) {
            btn.classList.remove('selected');
        });
        el.classList.add('selected');
        selectedStorage = el.getAttribute('data-value');
        document.getElementById('selectedStorageInput').value = selectedStorage;
    }
    
    function selectInsurance(el) {
        document.querySelectorAll('#insuranceOptions .option-btn').forEach(function(btn) {
            btn.classList.remove('selected');
        });
        el.classList.add('selected');
        selectedInsurance = el.getAttribute('data-value');
        document.getElementById('insuranceTypeInput').value = selectedInsurance;
        
        if (selectedInsurance === 'none') {
            insurancePrice = 0;
        } else if (selectedInsurance === 'basic') {
            insurancePrice = productPrice * 0.05;
        } else if (selectedInsurance === 'premium') {
            insurancePrice = productPrice * 0.10;
        }
        
        updateTotalPrice();
    }
    
    function updateTotalPrice() {
        var qty = parseInt(document.getElementById('quantityInput').value) || 1;
        document.getElementById('modalQtyInput').value = qty;
        
        var total = (productPrice + insurancePrice) * qty;
        document.getElementById('totalPrice').innerText = total.toFixed(2);
        
        var breakdown = '单价 ¥' + productPrice.toFixed(2);
        if (insurancePrice > 0) {
            breakdown += ' + 保障 ¥' + insurancePrice.toFixed(2);
        }
        breakdown += ' × ' + qty;
        document.getElementById('priceBreakdown').innerText = breakdown;
    }
    
    function submitCart() {
        var qty = document.getElementById('quantityInput').value;
        var productId = /*[[${product.id}]]*/ 0;
        
        var formData = new FormData();
        formData.append('quantity', qty);
        formData.append('selectedColor', selectedColor);
        formData.append('selectedStorage', selectedStorage);
        formData.append('insuranceType', selectedInsurance);
        
        fetch('/cart/add/' + productId, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                var modal = bootstrap.Modal.getInstance(document.getElementById('cartModal'));
                modal.hide();
                
                var cartBadge = document.querySelector('.cart-badge');
                if (cartBadge && data.cartCount !== undefined) {
                    cartBadge.textContent = data.cartCount;
                    cartBadge.style.display = data.cartCount > 0 ? 'inline' : 'none';
                }
                if (typeof updateCartBadge === 'function') {
                    updateCartBadge();
                }
            } else {
                alert(data.message);
            }
        })
        .catch(error => {
            alert('加入购物车失败，请重试');
        });
    }
    
    function renderSpecifications() {
        var container = document.getElementById('specContent');
        var empty = document.getElementById('specEmpty');
        
        if (specifications && specifications.trim() !== '') {
            try {
                var spec = JSON.parse(specifications);
                var html = '<table class="spec-table"><tbody>';
                for (var key in spec) {
                    if (spec.hasOwnProperty(key)) {
                        html += '<tr><td>' + key + '</td><td>' + spec[key] + '</td></tr>';
                    }
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                empty.style.display = 'block';
            }
        } else {
            empty.style.display = 'block';
        }
    }
    
    function renderFeatures() {
        var container = document.getElementById('featureContent');
        var empty = document.getElementById('featureEmpty');
        
        if (features && features.trim() !== '') {
            var lines = features.split('\n');
            var html = '';
            lines.forEach(function(line) {
                if (line.trim() !== '') {
                    html += '<div class="feature-item">' + line + '</div>';
                }
            });
            container.innerHTML = html;
        } else {
            empty.style.display = 'block';
        }
    }
    
    function renderPackaging() {
        var container = document.getElementById('packagingContent');
        var empty = document.getElementById('packagingEmpty');
        
        if (packagingList && packagingList.trim() !== '') {
            var lines = packagingList.split('\n');
            var html = '';
            lines.forEach(function(line) {
                if (line.trim() !== '') {
                    html += '<div class="packaging-item">' + line + '</div>';
                }
            });
            container.innerHTML = html;
        } else {
            empty.style.display = 'block';
        }
    }
    
    var currentIndex = 0;
    var totalImages = 0;
    var imageUrls = [];
    
    document.addEventListener('DOMContentLoaded', function() {
        var thumbItems = document.querySelectorAll('.thumb-item');
        totalImages = thumbItems.length;
        thumbItems.forEach(function(item) {
            imageUrls.push(item.getAttribute('data-src'));
        });
    });
    
    function setMain(el) {
        var src = el.getAttribute('data-src');
        var index = parseInt(el.getAttribute('data-index'));
        if (!src) return;
        
        var main = document.getElementById('mainImg');
        if (main) {
            main.style.opacity = '0';
            setTimeout(function() {
                main.src = src;
                main.style.opacity = '1';
            }, 150);
        }
        
        currentIndex = index;
        updateCounter();
        
        document.querySelectorAll('.thumb-item').forEach(function(t){ t.classList.remove('active'); });
        el.classList.add('active');
    }
    
    function prevImage() {
        if (totalImages <= 1) return;
        currentIndex = currentIndex - 1;
        if (currentIndex < 0) currentIndex = totalImages - 1;
        showImage(currentIndex);
    }
    
    function nextImage() {
        if (totalImages <= 1) return;
        currentIndex = currentIndex + 1;
        if (currentIndex >= totalImages) currentIndex = 0;
        showImage(currentIndex);
    }
    
    function showImage(index) {
        var main = document.getElementById('mainImg');
        if (main && imageUrls[index]) {
            main.style.opacity = '0';
            setTimeout(function() {
                main.src = imageUrls[index];
                main.style.opacity = '1';
            }, 150);
        }
        
        updateCounter();
        
        document.querySelectorAll('.thumb-item').forEach(function(t, i) {
            if (i === index) {
                t.classList.add('active');
            } else {
                t.classList.remove('active');
            }
        });
    }
    
    function updateCounter() {
        var counter = document.getElementById('currentIndex');
        if (counter) {
            counter.textContent = currentIndex + 1;
        }
    }
    
    function changeQty(delta) {
        var input = document.getElementById('quantityInput');
        var max = parseInt(input.getAttribute('max')) || 99;
        var val = parseInt(input.value) || 1;
        val = val + delta;
        if (val < 1) val = 1;
        if (val > max) val = max;
        input.value = val;
        updateTotalPrice();
    }
</script>
</body>
</html>
