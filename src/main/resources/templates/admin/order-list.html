<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body class="bg-light">
<nav th:replace="~{layout :: nav}"></nav>
<main class="container py-4">
    <h2 class="mb-4">订单列表</h2>
    <p class="text-muted">以下为全部订单，用于演示“后台管理查看订单”环节。</p>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>订单ID</th>
                    <th>总价（元）</th>
                    <th>状态</th>
                    <th>下单时间</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.id}">1</td>
                    <td th:text="${o.totalPrice}">0</td>
                    <td th:text="${o.status}">待付款</td>
                    <td th:text="${o.createTime != null ? #temporals.format(o.createTime, 'yyyy-MM-dd HH:mm') : '-'}">时间</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <a href="/" class="btn btn-outline-primary">返回首页</a>
        <a href="/order/list" class="btn btn-outline-secondary ms-2">我的订单</a>
    </div>
</main>
<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
