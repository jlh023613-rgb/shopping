<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单列表 - 管理控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080C14;
            --bg-sidebar: #0D1117;
            --bg-card: #161B22;
            --bg-card-hover: #21262D;
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --primary-light: #A78BFA;
            --secondary: #2563EB;
            --primary-glow: rgba(124, 58, 237, 0.4);
            --text-white: #F0F6FC;
            --text-gray: #8B949E;
            --text-muted: #6E7681;
            --border: #30363D;
            --success: #3FB950;
            --warning: #D29922;
            --danger: #F85149;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 13px;
            color: var(--text-white);
            margin: 0;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        .container-fluid { position: relative; z-index: 1; }
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            min-height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }
        .sidebar-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-icon::before {
            content: '⚙';
            font-size: 18px;
            color: white;
        }
        .sidebar-header h5 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: white;
        }
        .nav-section {
            padding: 12px 16px 8px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .nav-section:first-of-type { margin-top: 0; border-top: none; }
        .sidebar .nav-link {
            color: var(--text-gray);
            padding: 10px 16px;
            border-radius: 0;
            margin: 0;
            font-size: 13px;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .sidebar .nav-link:hover {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary-light);
            border-left-color: var(--primary);
        }
        .sidebar .nav-link.active {
            background: rgba(124, 58, 237, 0.2);
            color: white;
            font-weight: 500;
            border-left-color: var(--primary);
        }
        .nav-icon {
            width: 18px;
            text-align: center;
            font-size: 14px;
        }
        .nav-logout {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid var(--border);
        }
        .nav-logout .nav-link {
            color: var(--danger);
        }
        .nav-logout .nav-link:hover {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border-left-color: var(--danger);
        }
        .content-area {
            margin-left: 220px;
            padding: 24px;
            min-height: 100vh;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }
        .data-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .data-card .card-body { padding: 0; }
        .table {
            margin-bottom: 0;
            font-size: 13px;
            color: var(--text-white);
        }
        .table thead th {
            background: rgba(124, 58, 237, 0.15);
            color: var(--primary-light);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .table tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .table tbody tr:hover {
            background: var(--bg-card-hover);
        }
        .table tbody tr:last-child td {
            border-bottom: none;
        }
        .order-id {
            font-family: 'SF Mono', 'Consolas', monospace;
            color: var(--primary-light);
            font-weight: 500;
        }
        .order-price {
            color: var(--success);
            font-weight: 600;
            font-size: 14px;
        }
        .badge {
            font-size: 11px;
            font-weight: 500;
            border-radius: 6px;
            padding: 4px 10px;
            display: inline-block;
        }
        .badge-pending { background: rgba(210, 153, 34, 0.2); color: var(--warning); }
        .badge-paid { background: rgba(37, 99, 235, 0.2); color: #60A5FA; }
        .badge-shipping { background: rgba(37, 99, 235, 0.2); color: #60A5FA; }
        .badge-delivered { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-completed { background: rgba(63, 185, 80, 0.2); color: var(--success); }
        .badge-cancelled { background: rgba(110, 118, 129, 0.2); color: var(--text-muted); }
        .badge-refunded { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
        .order-time {
            color: var(--text-muted);
            font-size: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-text {
            font-size: 14px;
        }
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.purple::before { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
        .stat-card.blue::before { background: linear-gradient(90deg, var(--secondary), #60A5FA); }
        .stat-card.green::before { background: linear-gradient(90deg, var(--success), #6FCF97); }
        .stat-card.red::before { background: linear-gradient(90deg, var(--danger), #F87171); }
        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-white);
        }
        .table > :not(caption) > * > * {
            background-color: var(--bg-card) !important;
            color: var(--text-white) !important;
            border-color: var(--border) !important;
        }
        .table > thead > * > * {
            background-color: rgba(124, 58, 237, 0.15) !important;
            color: var(--primary-light) !important;
        }
        .table > tbody > tr:hover > * {
            background-color: var(--bg-card-hover) !important;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="admin-icon"></div>
                <h5>管理控制台</h5>
            </div>
            <nav class="nav flex-column">
                <div class="nav-section">概览</div>
                <a class="nav-link" href="/admin/dashboard">
                    <span class="nav-icon">◉</span>
                    数据总览
                </a>
                <div class="nav-section">商家管理</div>
                <a class="nav-link" href="/admin/merchants">
                    <span class="nav-icon">◈</span>
                    商家审核
                </a>
                <div class="nav-section">订单管理</div>
                <a class="nav-link active" href="/admin/order-list">
                    <span class="nav-icon">▤</span>
                    订单列表
                </a>
                <div class="nav-section">售后管理</div>
                <a class="nav-link" href="/admin/complaints">
                    <span class="nav-icon">◈</span>
                    投诉管理
                </a>
                <a class="nav-link" href="/admin/refunds">
                    <span class="nav-icon">◈</span>
                    退款管理
                </a>
                <div class="nav-logout">
                    <a class="nav-link" href="/admin/logout">
                        <span class="nav-icon">⏻</span>
                        退出登录
                    </a>
                </div>
            </nav>
        </div>
        <div class="content-area">
            <div class="page-title">订单列表</div>
            
            <div class="stat-row" th:if="${orders != null and !orders.isEmpty()}">
                <div class="stat-card purple">
                    <div class="stat-label">总订单数</div>
                    <div class="stat-number" th:text="${orders.size()}">0</div>
                </div>
                <div class="stat-card blue">
                    <div class="stat-label">待处理</div>
                    <div class="stat-number" th:text="${#aggregates.sum(orders.?[status == 'pending'].![1])}">0</div>
                </div>
                <div class="stat-card green">
                    <div class="stat-label">已完成</div>
                    <div class="stat-number" th:text="${#aggregates.sum(orders.?[status == 'completed'].![1])}">0</div>
                </div>
                <div class="stat-card red">
                    <div class="stat-label">已退款</div>
                    <div class="stat-number" th:text="${#aggregates.sum(orders.?[status == 'refunded'].![1])}">0</div>
                </div>
            </div>
            
            <div class="data-card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>订单ID</th>
                                <th>总价</th>
                                <th>状态</th>
                                <th>下单时间</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o : ${orders}">
                                <td><span class="order-id" th:text="${o.id}">1</span></td>
                                <td><span class="order-price">¥<span th:text="${o.totalPrice}">0</span></span></td>
                                <td>
                                    <span class="badge badge-pending" th:if="${o.status == 'pending'}">待付款</span>
                                    <span class="badge badge-paid" th:if="${o.status == 'paid'}">已付款</span>
                                    <span class="badge badge-shipping" th:if="${o.status == 'shipping'}">运输中</span>
                                    <span class="badge badge-delivered" th:if="${o.status == 'delivered'}">已送达</span>
                                    <span class="badge badge-completed" th:if="${o.status == 'completed'}">已完成</span>
                                    <span class="badge badge-cancelled" th:if="${o.status == 'cancelled'}">已取消</span>
                                    <span class="badge badge-refunded" th:if="${o.status == 'refunded'}">已退款</span>
                                    <span th:if="${o.status != 'pending' and o.status != 'paid' and o.status != 'shipping' and o.status != 'delivered' and o.status != 'completed' and o.status != 'cancelled' and o.status != 'refunded'}" th:text="${o.status}"></span>
                                </td>
                                <td><span class="order-time" th:text="${o.createTime != null ? #temporals.format(o.createTime, 'yyyy-MM-dd HH:mm') : '-'}">时间</span></td>
                            </tr>
                            <tr th:if="${orders == null or orders.isEmpty()}">
                                <td colspan="4">
                                    <div class="empty-state">
                                        <div class="empty-icon">📭</div>
                                        <div class="empty-text">暂无订单数据</div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
