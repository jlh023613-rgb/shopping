<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投诉管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: #333; color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .complaint-card { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 10px; }
        .complaint-body { padding: 12px 14px; }
        .complaint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .badge { font-size: 11px; font-weight: 500; border-radius: 2px; padding: 3px 8px; }
        .badge-pending { background: #FFF3E0; color: #E65100; }
        .badge-handled { background: #E8F5E9; color: #2E7D32; }
        .info-row { font-size: 12px; margin-bottom: 4px; }
        .info-label { color: var(--text-muted); }
        .info-value { color: var(--text-dark); font-weight: 500; }
        .complaint-content { color: var(--text-secondary); font-size: 12px; margin-top: 6px; padding: 8px 10px; background: #fafafa; border: 1px solid var(--border); border-radius: 2px; }
        .result-box { background: #E8F5E9; border: 1px solid #C8E6C9; border-radius: 2px; padding: 8px 10px; margin-top: 8px; font-size: 12px; }
        .result-label { color: #2E7D32; font-weight: 600; font-size: 11px; }
        .result-text { color: var(--text-secondary); }
        .filter-btn { border-radius: 2px; font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); background: white; color: var(--text-secondary); }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .form-control { border-radius: 2px; border: 1px solid var(--border); font-size: 12px; padding: 6px 10px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); }
        .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
        .form-check-label { font-size: 12px; color: var(--text-secondary); }
        .btn-handle { background: #2E7D32; color: white; border: none; border-radius: 2px; font-size: 11px; padding: 4px 12px; font-weight: 500; }
        .btn-handle:hover { background: #1B5E20; color: white; }
        .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5>管理员后台</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="/admin/dashboard">概览</a>
                <a class="nav-link" href="/admin/merchants">商家管理</a>
                <a class="nav-link active" href="/admin/complaints">投诉管理</a>
                <a class="nav-link" href="/admin/refunds">退款管理</a>
                <a class="nav-link" href="/admin/order-list">订单列表</a>
                <a class="nav-link" href="/admin/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="page-title mb-0 pb-0 border-0">投诉管理</div>
                <div>
                    <a href="/admin/complaints" class="filter-btn" th:classappend="${currentStatus == null or currentStatus.isEmpty()} ? ' active'">全部</a>
                    <a href="/admin/complaints?status=pending" class="filter-btn" th:classappend="${currentStatus == 'pending'} ? ' active'">待处理</a>
                    <a href="/admin/complaints?status=handled" class="filter-btn" th:classappend="${currentStatus == 'handled'} ? ' active'">已处理</a>
                </div>
            </div>

            <div th:if="${complaints == null or complaints.isEmpty()}" class="empty-state">
                <p>暂无投诉</p>
            </div>

            <div th:each="c : ${complaints}" class="complaint-card">
                <div class="complaint-body">
                    <div class="complaint-header">
                        <div>
                            <span class="info-value" th:text="'投诉人: ' + ${c.username}"></span>
                            <span style="color:var(--text-muted);font-size:11px;margin-left:10px" th:text="'被投诉商家: ' + ${c.merchantShopName}"></span>
                            <span class="badge badge-pending ms-2" th:if="${c.status == 'pending'}">待处理</span>
                            <span class="badge badge-handled ms-2" th:if="${c.status == 'handled'}">已处理</span>
                        </div>
                        <span style="color:var(--text-muted);font-size:11px" th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                    </div>
                    <div th:if="${c.orderNo != null}" class="info-row">
                        <span class="info-label">关联订单：</span>
                        <span class="info-value" style="font-size:11px" th:text="${c.orderNo}"></span>
                    </div>
                    <div class="complaint-content" th:text="${c.content}"></div>
                    <div th:if="${c.result != null}" class="result-box">
                        <span class="result-label">处理结果：</span>
                        <span class="result-text" th:text="${c.result}"></span>
                    </div>
                    <form th:if="${c.status == 'pending'}" th:action="@{/admin/complaint/handle/{id}(id=${c.id})}" method="post" style="margin-top:8px">
                        <div style="display:flex;align-items:center;gap:8px">
                            <input type="text" name="result" class="form-control" style="flex:1" placeholder="输入处理结果..." required>
                            <div class="form-check" style="white-space:nowrap">
                                <input type="checkbox" name="closeShop" value="true" class="form-check-input" th:id="'closeShop' + ${c.id}">
                                <label class="form-check-label" th:for="'closeShop' + ${c.id}">关停店铺</label>
                            </div>
                            <button type="submit" class="btn-handle">处理</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
