<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 13px; color: var(--text-dark); margin: 0; }
        .sidebar { background: white; border-right: 1px solid var(--border); min-height: 100vh; padding-top: 0; }
        .sidebar-header { background: #333; color: white; padding: 16px 16px 12px; }
        .sidebar-header h5 { margin: 0; font-size: 15px; font-weight: 700; }
        .sidebar .nav-link { color: var(--text-dark); padding: 10px 16px; border-radius: 0; margin: 0; font-size: 13px; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); }
        .sidebar .nav-link.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-left-color: var(--primary); }
        .content-area { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .stat-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; }
        .stat-card .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-card .stat-number { font-size: 22px; font-weight: 700; }
        .data-card { background: white; border: 1px solid var(--border); border-radius: 4px; }
        .data-card .card-body { padding: 14px 16px; }
        .data-card .card-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .btn-quick { border-radius: 2px; font-size: 12px; padding: 6px 14px; font-weight: 500; border: 1px solid; }
        .btn-quick-warn { background: #FFF3E0; color: #E65100; border-color: #FFE0B2; }
        .btn-quick-warn:hover { background: #FFE0B2; color: #E65100; }
        .btn-quick-info { background: #E3F2FD; color: #1565C0; border-color: #BBDEFB; }
        .btn-quick-info:hover { background: #BBDEFB; color: #1565C0; }
        .btn-quick-danger { background: #FFEBEE; color: #C62828; border-color: #FFCDD2; }
        .btn-quick-danger:hover { background: #FFCDD2; color: #C62828; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <div class="sidebar-header">
                <h5>管理员后台</h5>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="/admin/dashboard">概览</a>
                <a class="nav-link" href="/admin/merchants">商家管理</a>
                <a class="nav-link" href="/admin/complaints">投诉管理</a>
                <a class="nav-link" href="/admin/refunds">退款管理</a>
                <a class="nav-link" href="/admin/order-list">订单列表</a>
                <a class="nav-link" href="/admin/logout">退出登录</a>
            </nav>
        </div>
        <div class="col-md-10 content-area">
            <div class="page-title">管理概览</div>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-label">待审核商家</div>
                        <div class="stat-number" style="color:#E65100" th:text="${pendingMerchants}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-label">正常营业商家</div>
                        <div class="stat-number" style="color:#2E7D32" th:text="${activeMerchants}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-label">待处理投诉</div>
                        <div class="stat-number" style="color:#1565C0" th:text="${pendingComplaints}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-label">待处理退款</div>
                        <div class="stat-number" style="color:#C62828" th:text="${pendingRefunds}">0</div>
                    </div>
                </div>
            </div>
            <div class="data-card">
                <div class="card-body">
                    <div class="card-title">快捷操作</div>
                    <a href="/admin/merchants?status=pending" class="btn-quick btn-quick-warn me-2">审核商家</a>
                    <a href="/admin/complaints?status=pending" class="btn-quick btn-quick-info me-2">处理投诉</a>
                    <a href="/admin/refunds" class="btn-quick btn-quick-danger">处理退款</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
