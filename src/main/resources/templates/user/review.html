<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head}"></head>
<body class="bg-light">
<style>
    :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
    body { background-color: var(--bg); }
    .page-title { font-size: 16px; font-weight: 600; color: var(--text-dark); padding-left: 10px; border-left: 3px solid var(--primary); margin-bottom: 16px; }
    .review-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 20px; max-width: 560px; margin: 0 auto; }
    .product-row { display: flex; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .product-img { width: 50px; height: 50px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; margin-right: 10px; }
    .product-name { font-size: 13px; color: var(--text-dark); font-weight: 500; }
    .product-price { font-size: 12px; color: var(--primary); }
    .star-rating { display: flex; gap: 4px; }
    .star-rating .star { font-size: 1.5rem; cursor: pointer; color: #ddd; transition: color 0.15s; }
    .star-rating .star.active, .star-rating .star:hover { color: #FF4400; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .form-control { border-radius: 2px; border: 1px solid var(--border); font-size: 13px; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); }
    .btn-submit { background: var(--primary); color: white; border: none; padding: 8px 0; border-radius: 2px; font-weight: 600; font-size: 14px; width: 100%; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: var(--primary-dark); color: white; }
</style>

<nav th:replace="~{layout :: nav}"></nav>

<main class="container py-3">
    <div class="page-title">评价商品</div>
    <div class="review-card">
        <div class="product-row">
            <img th:if="${order.productImage != null}" th:src="${order.productImage}" class="product-img">
            <div>
                <div class="product-name" th:text="${order.productName}"></div>
                <div class="product-price" th:text="'¥' + ${order.totalPrice}"></div>
            </div>
        </div>
        <form method="post" action="/user/review/submit">
            <input type="hidden" name="orderId" th:value="${order.id}">
            <input type="hidden" name="productId" th:value="${order.productId}">
            <input type="hidden" name="rating" id="ratingInput" value="5">
            <div class="mb-3">
                <label class="form-label">评分</label>
                <div class="star-rating" id="starRating">
                    <span class="star active" data-value="1">★</span>
                    <span class="star active" data-value="2">★</span>
                    <span class="star active" data-value="3">★</span>
                    <span class="star active" data-value="4">★</span>
                    <span class="star active" data-value="5">★</span>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">评价内容</label>
                <textarea name="content" class="form-control" rows="4" placeholder="分享你的购物体验..."></textarea>
            </div>
            <button type="submit" class="btn-submit">提交评价</button>
        </form>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script>
    document.querySelectorAll('#starRating .star').forEach(function(star) {
        star.addEventListener('click', function() {
            var value = parseInt(this.getAttribute('data-value'));
            document.getElementById('ratingInput').value = value;
            document.querySelectorAll('#starRating .star').forEach(function(s, i) {
                s.classList.toggle('active', i < value);
            });
        });
    });
</script>
</body>
</html>
