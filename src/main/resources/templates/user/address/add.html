<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加收货地址</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
        body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; color: var(--text-dark); }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); }
        .top-nav { background: white; border-bottom: 2px solid var(--primary); padding: 0; }
        .top-nav .container { height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .top-nav .logo { color: var(--primary); font-weight: 700; font-size: 16px; }
        .top-nav .nav-links { display: flex; align-items: center; gap: 16px; font-size: 12px; }
        .top-nav .nav-links a { color: var(--text-secondary); }
        .top-nav .nav-links a:hover { color: var(--primary); }
        .form-container { max-width: 560px; margin: 24px auto; }
        .form-card { background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .form-header { background: var(--primary); color: white; font-weight: 600; padding: 12px 20px; font-size: 15px; }
        .form-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-weight: 600; color: var(--text-dark); margin-bottom: 6px; display: block; font-size: 13px; }
        .form-control { border-radius: 2px; border: 1px solid var(--border); padding: 8px 10px; font-size: 13px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); }
        .btn-primary { background-color: var(--primary); border-color: var(--primary); border-radius: 2px; font-size: 13px; padding: 8px 20px; }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }
        .btn-outline-secondary { border-color: var(--border); color: var(--text-secondary); border-radius: 2px; font-size: 13px; padding: 8px 20px; }
        .btn-outline-secondary:hover { background-color: var(--text-secondary); color: white; }
        .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
        .form-check-label { font-weight: 400; color: var(--text-secondary); font-size: 13px; }
        footer { background: #333; color: #aaa; text-align: center; padding: 16px 0; margin-top: 40px; font-size: 12px; }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="container">
        <a href="/" class="logo">网上商城</a>
        <div class="nav-links">
            <a href="/user/center">用户中心</a>
        </div>
    </div>
</nav>

<div class="form-container">
    <div class="form-card">
        <div class="form-header">添加收货地址</div>
        <div class="form-body">
            <form action="/user/address/add" method="post" onsubmit="return validateForm();">
                <div class="form-group">
                    <label for="name" class="form-label">收货人姓名</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="请输入收货人姓名" required>
                    <div id="nameError" class="text-danger small mt-1"></div>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">手机号</label>
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号" required>
                    <div id="phoneError" class="text-danger small mt-1"></div>
                </div>
                <div class="row">
                    <div class="col-4 form-group">
                        <label for="province" class="form-label">省份</label>
                        <input type="text" class="form-control" id="province" name="province" placeholder="请输入省份" required>
                        <div id="provinceError" class="text-danger small mt-1"></div>
                    </div>
                    <div class="col-4 form-group">
                        <label for="city" class="form-label">城市</label>
                        <input type="text" class="form-control" id="city" name="city" placeholder="请输入城市" required>
                        <div id="cityError" class="text-danger small mt-1"></div>
                    </div>
                    <div class="col-4 form-group">
                        <label for="district" class="form-label">区县</label>
                        <input type="text" class="form-control" id="district" name="district" placeholder="请输入区县" required>
                        <div id="districtError" class="text-danger small mt-1"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="detail" class="form-label">详细地址</label>
                    <textarea class="form-control" id="detail" name="detail" rows="2" placeholder="请输入详细地址" required></textarea>
                    <div id="detailError" class="text-danger small mt-1"></div>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="isDefault" name="isDefault" value="true">
                    <label class="form-check-label" for="isDefault">设为默认地址</label>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a href="/user/center" class="btn btn-outline-secondary">取消</a>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer>
    <div class="container">&copy; 2024 网上商城 版权所有</div>
</footer>

<script>
    function validatePhone(phone) { return /^1[3-9]\d{9}$/.test(phone); }
    
    function validateForm() {
        var name = document.getElementById('name').value;
        var phone = document.getElementById('phone').value;
        var province = document.getElementById('province').value;
        var city = document.getElementById('city').value;
        var district = document.getElementById('district').value;
        var detail = document.getElementById('detail').value;
        var isValid = true;
        if (!name || name.trim() === '') { document.getElementById('nameError').textContent = '收货人姓名不能为空'; isValid = false; }
        else if (name.length < 2 || name.length > 20) { document.getElementById('nameError').textContent = '收货人姓名长度必须为2-20位'; isValid = false; }
        else { document.getElementById('nameError').textContent = ''; }
        if (!phone || phone.trim() === '') { document.getElementById('phoneError').textContent = '手机号不能为空'; isValid = false; }
        else if (!validatePhone(phone)) { document.getElementById('phoneError').textContent = '请输入正确的手机号'; isValid = false; }
        else { document.getElementById('phoneError').textContent = ''; }
        if (!province || province.trim() === '') { document.getElementById('provinceError').textContent = '省份不能为空'; isValid = false; }
        else { document.getElementById('provinceError').textContent = ''; }
        if (!city || city.trim() === '') { document.getElementById('cityError').textContent = '城市不能为空'; isValid = false; }
        else { document.getElementById('cityError').textContent = ''; }
        if (!district || district.trim() === '') { document.getElementById('districtError').textContent = '区县不能为空'; isValid = false; }
        else { document.getElementById('districtError').textContent = ''; }
        if (!detail || detail.trim() === '') { document.getElementById('detailError').textContent = '详细地址不能为空'; isValid = false; }
        else if (detail.length < 5 || detail.length > 200) { document.getElementById('detailError').textContent = '详细地址长度必须为5-200位'; isValid = false; }
        else { document.getElementById('detailError').textContent = ''; }
        return isValid;
    }
</script>
</body>
</html>
