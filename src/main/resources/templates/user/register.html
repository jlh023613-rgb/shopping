<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; }
        body {
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .register-card {
            background: white;
            border-radius: 4px;
            padding: 2rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid #e8e8e8;
        }
        .register-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 20px;
            font-weight: 700;
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            width: 100%;
            padding: 0.6rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }
        .form-control, .form-select { border-radius: 4px; padding: 0.6rem; font-size: 14px; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(255,68,0,0.15); }
        .alert { border-radius: 4px; font-size: 13px; }
        .links { text-align: center; margin-top: 1rem; font-size: 13px; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 4px; transition: all 0.3s; }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
        .strength-text { font-size: 11px; margin-top: 2px; }
        .brand { color: var(--primary); font-weight: 700; text-align: center; margin-bottom: 0.5rem; font-size: 22px; }
        .modal-content { border-radius: 4px; }
    </style>
</head>
<body>
<div class="register-card">
    <div class="brand">网上商城</div>
    <h3 class="register-title">用户注册</h3>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form id="registerForm" th:action="@{/user/register}" method="post">
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">用户名</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="请输入用户名" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">手机号</label>
            <input type="text" name="phone" id="phone" class="form-control" placeholder="请输入手机号" required>
            <div id="phoneError" class="text-danger small mt-1" style="font-size: 11px;"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">密码</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="请输入密码" required minlength="12" maxlength="16">
            <div class="password-strength" id="strengthBar"></div>
            <div class="strength-text" id="strengthText"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">确认密码</label>
            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
            <div id="confirmError" class="text-danger small mt-1" style="font-size: 11px;"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">性别</label>
            <select name="gender" class="form-select">
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
        </div>
        <button type="button" class="btn btn-primary" onclick="showCaptchaModal()">注册</button>
    </form>

    <div class="links">
        已有账号？<a href="/user/login" style="color: var(--primary);">立即登录</a>
    </div>
</div>

<div class="modal fade" id="captchaModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" style="border-bottom: 1px solid #e8e8e8;">
                <h5 class="modal-title" style="font-size: 15px;">请输入验证码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <div class="mb-3">
                    <canvas id="captchaCanvas" width="150" height="50" style="border: 1px solid #e8e8e8; border-radius: 2px; cursor: pointer;" onclick="generateCaptcha()"></canvas>
                </div>
                <div class="text-muted small mb-2" style="font-size: 11px;">点击图片刷新验证码</div>
                <input type="text" id="captchaInput" class="form-control text-center" placeholder="请输入验证码" maxlength="4" style="font-size: 1.1rem; letter-spacing: 5px;">
                <div id="captchaError" class="text-danger small mt-2" style="font-size: 11px;"></div>
            </div>
            <div class="modal-footer" style="border-top: 1px solid #e8e8e8;">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal" style="border-radius: 4px;">取消</button>
                <button type="button" class="btn btn-sm btn-primary" style="border-radius: 4px;" onclick="submitForm()">确认注册</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let captchaCode = '';
    
    function generateCaptcha() {
        const canvas = document.getElementById('captchaCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        
        ctx.fillStyle = '#f0f0f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        captchaCode = '';
        for (let i = 0; i < 4; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            captchaCode += char;
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = `rgb(${Math.random() * 100}, ${Math.random() * 100}, ${Math.random() * 100})`;
            ctx.fillText(char, 20 + i * 32, 35);
        }
        
        for (let i = 0; i < 5; i++) {
            ctx.strokeStyle = `rgb(${Math.random() * 200}, ${Math.random() * 200}, ${Math.random() * 200})`;
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.stroke();
        }
        
        document.getElementById('captchaInput').value = '';
        document.getElementById('captchaError').textContent = '';
    }
    
    function checkPasswordStrength(password) {
        let types = 0;
        if (/[a-z]/.test(password)) types++;
        if (/[A-Z]/.test(password)) types++;
        if (/[0-9]/.test(password)) types++;
        if (/[^a-zA-Z0-9]/.test(password)) types++;
        return types;
    }
    
    function updateStrengthBar() {
        const password = document.getElementById('password').value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        const types = checkPasswordStrength(password);
        
        bar.className = 'password-strength';
        if (password.length === 0) {
            bar.style.display = 'none';
            text.textContent = '';
        } else if (types <= 1) {
            bar.classList.add('strength-weak');
            text.textContent = '弱密码 - 请包含大小写字母、数字或特殊字符';
            text.style.color = '#dc3545';
        } else if (types === 2) {
            bar.classList.add('strength-medium');
            text.textContent = '中密码';
            text.style.color = '#ffc107';
        } else {
            bar.classList.add('strength-strong');
            text.textContent = '强密码';
            text.style.color = '#28a745';
        }
    }
    
    function validatePhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }
    
    function validateForm() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phoneError = document.getElementById('phoneError');
        const confirmError = document.getElementById('confirmError');
        
        phoneError.textContent = '';
        confirmError.textContent = '';
        
        if (!validatePhone(phone)) {
            phoneError.textContent = '请输入正确的手机号格式';
            return false;
        }
        
        if (password.length < 12 || password.length > 16) {
            alert('密码长度必须为12-16位');
            return false;
        }
        
        const types = checkPasswordStrength(password);
        if (types <= 1) {
            alert('密码强度太弱，请包含大小写字母、数字或特殊字符中的至少两种');
            return false;
        }
        
        if (password !== confirmPassword) {
            confirmError.textContent = '两次输入的密码不一致';
            return false;
        }
        
        return true;
    }
    
    function showCaptchaModal() {
        if (!validateForm()) return;
        generateCaptcha();
        const modal = new bootstrap.Modal(document.getElementById('captchaModal'));
        modal.show();
    }
    
    function submitForm() {
        const input = document.getElementById('captchaInput').value.toUpperCase();
        const error = document.getElementById('captchaError');
        
        if (input !== captchaCode) {
            error.textContent = '验证码错误，请重新输入';
            generateCaptcha();
            return;
        }
        
        bootstrap.Modal.getInstance(document.getElementById('captchaModal')).hide();
        document.getElementById('registerForm').submit();
    }
    
    document.getElementById('password').addEventListener('input', updateStrengthBar);
    
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const confirmError = document.getElementById('confirmError');
        if (this.value !== document.getElementById('password').value) {
            confirmError.textContent = '两次输入的密码不一致';
        } else {
            confirmError.textContent = '';
        }
    });
    
    document.getElementById('phone').addEventListener('blur', function() {
        const phoneError = document.getElementById('phoneError');
        if (this.value && !validatePhone(this.value)) {
            phoneError.textContent = '请输入正确的手机号格式';
        } else {
            phoneError.textContent = '';
        }
    });
</script>
</body>
</html>
