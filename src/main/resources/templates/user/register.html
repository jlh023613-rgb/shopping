<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
            position: relative;
            background: #1a1a2e;
            padding: 40px 20px;
        }
        .bg-flow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(-45deg, #1a1a2e, #e4393c, #1a1a2e, #e4393c, #1a1a2e);
            background-size: 400% 400%;
            animation: flowBg 12s ease infinite;
        }
        @keyframes flowBg {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        .bg-flow::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(228,57,60,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(26,26,46,0.3) 0%, transparent 50%);
        }
        .brand {
            position: relative;
            z-index: 10;
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 2px 20px rgba(228,57,60,0.5);
            letter-spacing: 4px;
        }
        .register-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 60px rgba(228,57,60,0.1);
        }
        .role-badge {
            position: absolute;
            top: -12px;
            right: 24px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(37,99,235,0.4);
            letter-spacing: 1px;
        }
        .register-title {
            text-align: center;
            margin-bottom: 28px;
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .form-group { margin-bottom: 18px; }
        .form-label {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            display: block;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px 8px 0 0;
            padding: 12px 16px;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
        }
        .form-control::placeholder, .form-select::placeholder { color: rgba(255,255,255,0.35); }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: none;
            border-bottom-color: #e4393c;
            color: white;
        }
        .form-select option { background: #1a1a2e; color: white; }
        .btn-register {
            background: linear-gradient(135deg, #e4393c 0%, #c81623 100%);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(228,57,60,0.4);
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(228,57,60,0.6);
            color: white;
        }
        .alert {
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .login-link {
            color: #e4393c;
            font-weight: 500;
            text-decoration: none;
        }
        .login-link:hover { text-decoration: underline; color: #ff6b6b; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
        .strength-text { font-size: 11px; margin-top: 4px; color: rgba(255,255,255,0.6); }
        .error-text { font-size: 11px; color: #fca5a5; margin-top: 4px; }
        .modal-content { border-radius: 16px; border: none; background: rgba(26,26,46,0.95); backdrop-filter: blur(20px); color: white; }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-title { color: white; }
        .btn-close { filter: invert(1); }
        .btn-modal-primary {
            background: linear-gradient(135deg, #e4393c 0%, #c81623 100%);
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
        }
        .btn-modal-secondary {
            border-radius: 8px;
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div class="bg-flow"></div>
<div class="brand">网上商城</div>
<div class="register-card">
    <div class="role-badge">用户</div>
    <h3 class="register-title">创建账号</h3>
    
    <div th:if="${error}" class="alert" th:text="${error}"></div>

    <form id="registerForm" th:action="@{/user/register}" method="post">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="text" name="phone" id="phone" class="form-control" placeholder="请输入手机号" required>
            <div id="phoneError" class="error-text"></div>
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="请输入密码 (12-16位)" required minlength="12" maxlength="16">
            <div class="password-strength" id="strengthBar"></div>
            <div class="strength-text" id="strengthText"></div>
        </div>
        <div class="form-group">
            <label class="form-label">确认密码</label>
            <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" placeholder="请再次输入密码" required>
            <div id="confirmError" class="error-text"></div>
        </div>
        <div class="form-group">
            <label class="form-label">性别</label>
            <select name="gender" class="form-select">
                <option value="M">男</option>
                <option value="F">女</option>
            </select>
        </div>
        <button type="button" class="btn btn-register" onclick="showCaptchaModal()">注册</button>
    </form>

    <div class="links">
        已有账号？<a href="/user/login" class="login-link">立即登录</a>
    </div>
</div>

<div class="modal fade" id="captchaModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" style="font-size: 16px; font-weight: 600;">请输入验证码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3">
                    <canvas id="captchaCanvas" width="150" height="50" style="border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer;" onclick="generateCaptcha()"></canvas>
                </div>
                <div style="color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 12px;">点击图片刷新验证码</div>
                <input type="text" id="captchaInput" class="form-control text-center" placeholder="请输入验证码" maxlength="4" style="font-size: 1.1rem; letter-spacing: 5px;">
                <div id="captchaError" class="error-text mt-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-modal-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-modal-primary" onclick="submitForm()">确认注册</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let captchaCode = '';
    
    function generateCaptcha() {
        const canvas = document.getElementById('captchaCanvas');
        const ctx = canvas.getContext('2d');
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        captchaCode = '';
        for (let i = 0; i < 4; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            captchaCode += char;
            ctx.font = 'bold 28px Arial';
            ctx.fillStyle = `rgb(${100 + Math.random() * 155}, ${100 + Math.random() * 155}, ${100 + Math.random() * 155})`;
            ctx.fillText(char, 20 + i * 32, 35);
        }
        
        for (let i = 0; i < 5; i++) {
            ctx.strokeStyle = `rgba(${Math.random() * 200}, ${Math.random() * 200}, ${Math.random() * 200}, 0.3)`;
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.stroke();
        }
        
        document.getElementById('captchaInput').value = '';
        document.getElementById('captchaError').textContent = '';
    }
    
    function checkPasswordStrength(password) {
        let types = 0;
        if (/[a-z]/.test(password)) types++;
        if (/[A-Z]/.test(password)) types++;
        if (/[0-9]/.test(password)) types++;
        if (/[^a-zA-Z0-9]/.test(password)) types++;
        return types;
    }
    
    function updateStrengthBar() {
        const password = document.getElementById('password').value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        const types = checkPasswordStrength(password);
        
        bar.className = 'password-strength';
        if (password.length === 0) {
            bar.style.display = 'none';
            text.textContent = '';
        } else if (types <= 1) {
            bar.classList.add('strength-weak');
            text.textContent = '弱密码 - 请包含大小写字母、数字或特殊字符';
            text.style.color = '#fca5a5';
        } else if (types === 2) {
            bar.classList.add('strength-medium');
            text.textContent = '中密码';
            text.style.color = '#fcd34d';
        } else {
            bar.classList.add('strength-strong');
            text.textContent = '强密码';
            text.style.color = '#86efac';
        }
    }
    
    function validatePhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }
    
    function validateForm() {
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phoneError = document.getElementById('phoneError');
        const confirmError = document.getElementById('confirmError');
        
        phoneError.textContent = '';
        confirmError.textContent = '';
        
        if (!validatePhone(phone)) {
            phoneError.textContent = '请输入正确的手机号格式';
            return false;
        }
        
        if (password.length < 12 || password.length > 16) {
            alert('密码长度必须为12-16位');
            return false;
        }
        
        const types = checkPasswordStrength(password);
        if (types <= 1) {
            alert('密码强度太弱，请包含大小写字母、数字或特殊字符中的至少两种');
            return false;
        }
        
        if (password !== confirmPassword) {
            confirmError.textContent = '两次输入的密码不一致';
            return false;
        }
        
        return true;
    }
    
    function showCaptchaModal() {
        if (!validateForm()) return;
        generateCaptcha();
        const modal = new bootstrap.Modal(document.getElementById('captchaModal'));
        modal.show();
    }
    
    function submitForm() {
        const input = document.getElementById('captchaInput').value.toUpperCase();
        const error = document.getElementById('captchaError');
        
        if (input !== captchaCode) {
            error.textContent = '验证码错误，请重新输入';
            generateCaptcha();
            return;
        }
        
        bootstrap.Modal.getInstance(document.getElementById('captchaModal')).hide();
        document.getElementById('registerForm').submit();
    }
    
    document.getElementById('password').addEventListener('input', updateStrengthBar);
    
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const confirmError = document.getElementById('confirmError');
        if (this.value !== document.getElementById('password').value) {
            confirmError.textContent = '两次输入的密码不一致';
        } else {
            confirmError.textContent = '';
        }
    });
    
    document.getElementById('phone').addEventListener('blur', function() {
        const phoneError = document.getElementById('phoneError');
        if (this.value && !validatePhone(this.value)) {
            phoneError.textContent = '请输入正确的手机号格式';
        } else {
            phoneError.textContent = '';
        }
    });
</script>
</body>
</html>
