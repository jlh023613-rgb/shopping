<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body class="bg-light">
<style>
    :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
    body { background-color: var(--bg); }
    .page-title { font-size: 16px; font-weight: 600; color: var(--text-dark); padding-left: 10px; border-left: 3px solid var(--primary); margin-bottom: 16px; }
    .section-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; margin-bottom: 12px; }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .address-card { border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
    .address-card:hover { border-color: var(--primary); }
    .address-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .address-name { font-weight: 600; font-size: 13px; }
    .address-phone { color: var(--text-muted); font-size: 12px; margin-left: 8px; }
    .address-detail { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .address-default { background: var(--primary); color: white; font-size: 10px; padding: 1px 6px; border-radius: 2px; margin-left: 6px; }
    .product-img { width: 50px; height: 50px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; background: #fff; }
    .product-name { font-size: 13px; color: var(--text-dark); font-weight: 500; }
    .product-spec { font-size: 12px; color: var(--text-muted); }
    .product-price { font-size: 14px; color: var(--primary); font-weight: 700; }
    .product-qty { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
    .summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; color: var(--text-secondary); }
    .summary-total { display: flex; justify-content: space-between; padding: 8px 0 0; border-top: 1px solid var(--border); margin-top: 8px; }
    .summary-total-label { font-weight: 600; font-size: 14px; color: var(--text-dark); }
    .summary-total-price { font-size: 20px; color: var(--primary); font-weight: 700; }
    .btn-submit { background: var(--primary); color: white; border: none; padding: 10px 0; border-radius: 2px; font-weight: 600; font-size: 14px; width: 100%; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: var(--primary-dark); color: white; }
    .btn-back { background: white; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 0; border-radius: 2px; font-size: 13px; width: 100%; cursor: pointer; }
    .btn-back:hover { border-color: var(--primary); color: var(--primary); }
    .item-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .item-row:last-child { border-bottom: none; }
</style>

<nav th:replace="~{layout :: nav}"></nav>

<main class="container py-3">
    <div class="page-title">确认订单</div>
    <div class="row">
        <div class="col-md-8">
            <div class="section-card">
                <div class="section-title">收货地址</div>
                <div th:if="${addresses == null or addresses.isEmpty()}" class="text-center py-3">
                    <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 8px;">暂无收货地址</p>
                    <a href="/user/address" style="color: var(--primary); font-size: 13px;">添加地址</a>
                </div>
                <div th:if="${addresses != null and !addresses.isEmpty()}" class="row g-2">
                    <div th:each="addr, stat : ${addresses}" class="col-md-6">
                        <div class="address-card" th:classappend="${stat.first} ? 'selected'" th:attr="data-id=${addr.id}" onclick="selectAddress(this)">
                            <div>
                                <span class="address-name" th:text="${addr.receiverName}">姓名</span>
                                <span class="address-phone" th:text="${addr.receiverPhone}">电话</span>
                                <span th:if="${addr.isDefault}" class="address-default">默认</span>
                            </div>
                            <div class="address-detail" th:text="${addr.province + addr.city + addr.district + addr.detailAddress}">地址</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title">商品清单</div>
                <div th:each="item : ${cartItems}" class="item-row">
                    <img th:if="${item.imageUrl != null}" th:src="${item.imageUrl}" class="product-img">
                    <div style="margin-left: 10px; flex-grow: 1; min-width: 0;">
                        <div class="product-name" th:text="${item.productName}">商品名称</div>
                        <div class="product-spec">
                            <span th:if="${item.selectedColor != null}" th:text="${item.selectedColor}"></span>
                            <span th:if="${item.selectedStorage != null}" th:text="${item.selectedStorage}"></span>
                        </div>
                    </div>
                    <div style="text-align: right; flex-shrink: 0; margin-left: 12px;">
                        <div>
                            <span class="product-price" th:text="'¥' + ${item.unitPrice != null ? item.unitPrice : item.price}"></span>
                            <span class="product-qty" th:text="'x' + ${item.quantity}"></span>
                        </div>
                        <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">小计：<span style="color: var(--primary); font-weight: 600;" th:text="'¥' + ${(item.unitPrice != null ? item.unitPrice : item.price) * item.quantity}"></span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="section-card" style="position: sticky; top: 60px;">
                <div class="section-title">订单结算</div>
                <div class="summary-row">
                    <span>商品数量</span>
                    <span th:text="${cartItems.size()} + ' 件'">0 件</span>
                </div>
                <div class="summary-row">
                    <span>商品金额</span>
                    <span style="color: var(--primary);" th:text="'¥' + ${total}">¥0.00</span>
                </div>
                <div class="summary-row">
                    <span>运费</span>
                    <span style="color: #2e7d32;">免运费</span>
                </div>
                <div class="summary-total">
                    <span class="summary-total-label">应付金额</span>
                    <span class="summary-total-price" th:text="'¥' + ${total}">¥0.00</span>
                </div>
                <input type="hidden" id="cartIds" th:value="${cartIds}">
                <input type="hidden" id="addressId" th:value="${addresses != null and !addresses.isEmpty()} ? ${addresses[0].id} : ''">
                <div style="margin-top: 16px;">
                    <button type="button" class="btn-submit" onclick="submitOrder()">提交订单</button>
                    <a href="/cart" class="btn-back" style="display: block; text-align: center; margin-top: 8px; text-decoration: none;">返回购物车</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script>
    function selectAddress(el) {
        document.querySelectorAll('.address-card').forEach(function(card) {
            card.classList.remove('selected');
        });
        el.classList.add('selected');
        document.getElementById('addressId').value = el.dataset.id;
    }

    function submitOrder() {
        var cartIds = document.getElementById('cartIds').value;
        var addressId = document.getElementById('addressId').value;

        if (!addressId) {
            alert('请选择收货地址');
            return;
        }

        var formData = new FormData();
        formData.append('cartIds', cartIds);
        formData.append('addressId', addressId);

        fetch('/checkout', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                window.location.href = '/user/orders';
            } else {
                alert(data.message || '下单失败');
            }
        })
        .catch(() => {
            alert('下单失败，请重试');
        });
    }
</script>
</body>
</html>
