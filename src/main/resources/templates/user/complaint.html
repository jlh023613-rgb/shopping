<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body class="bg-light">
<style>
    :root { --primary: #FF4400; --primary-dark: #E63E00; --primary-light: #FFF5F0; --bg: #F5F5F5; --border: #e8e8e8; --text-dark: #333; --text-secondary: #666; --text-muted: #999; }
    body { background-color: var(--bg); }
    .page-title { font-size: 16px; font-weight: 600; color: var(--text-dark); padding-left: 10px; border-left: 3px solid var(--primary); margin-bottom: 16px; }
    .complaint-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 20px; max-width: 640px; margin: 0 auto; }
    .order-info { background: #fafafa; border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-bottom: 16px; }
    .order-info-title { font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
    .product-img { width: 50px; height: 50px; object-fit: contain; border: 1px solid var(--border); border-radius: 2px; background: #fff; }
    .merchant-info { background: #FFF8E1; border: 1px solid #FFE082; border-radius: 4px; padding: 10px 12px; margin-bottom: 16px; font-size: 13px; }
    .merchant-info strong { color: var(--text-dark); }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .form-control { border-radius: 2px; border: 1px solid var(--border); font-size: 13px; }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.15rem rgba(255,68,0,0.15); }
    .btn-submit { background: #d32f2f; color: white; border: none; padding: 8px 0; border-radius: 2px; font-weight: 600; font-size: 14px; width: 100%; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: #b71c1c; color: white; }
    .btn-back { background: white; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 0; border-radius: 2px; font-size: 13px; width: 100%; cursor: pointer; text-align: center; display: block; text-decoration: none; margin-top: 8px; }
    .btn-back:hover { border-color: var(--primary); color: var(--primary); }
    .info-tip { background: #E3F2FD; border: 1px solid #BBDEFB; border-radius: 4px; padding: 8px 12px; font-size: 12px; color: #1565C0; margin-bottom: 16px; }
</style>

<nav th:replace="~{layout :: nav}"></nav>

<main class="container py-3">
    <div class="page-title">投诉商家</div>
    <div class="complaint-card">
        <div th:if="${order != null}" class="order-info">
            <div class="order-info-title">订单信息</div>
            <div class="d-flex align-items-center">
                <img th:if="${order.productImage != null}" th:src="${order.productImage}" class="product-img">
                <div style="margin-left: 10px;">
                    <div style="font-size: 13px; font-weight: 500;" th:text="${order.productName}">商品名称</div>
                    <div style="font-size: 12px; color: var(--text-muted);">订单号：<span th:text="${order.orderNo}"></span></div>
                </div>
            </div>
        </div>
        <div class="merchant-info">
            投诉商家：<strong th:text="${merchant.shopName}"></strong>
        </div>
        <form method="post" action="/user/complaint/submit">
            <input type="hidden" name="orderId" th:value="${order.id}">
            <input type="hidden" name="merchantId" th:value="${merchant.id}">
            <div class="mb-3">
                <label class="form-label">投诉内容</label>
                <textarea name="content" class="form-control" rows="5" placeholder="请详细描述投诉原因..." required></textarea>
            </div>
            <div class="info-tip">
                投诉提交后，管理员会尽快处理。同一订单只能投诉一次。
            </div>
            <button type="submit" class="btn-submit">提交投诉</button>
            <a href="/user/orders" class="btn-back">返回订单列表</a>
        </form>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
