<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .btn-primary {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem;
        }
        .alert {
            border-radius: 10px;
        }
        .links {
            text-align: center;
            margin-top: 1rem;
        }
        .register-link {
            color: #764ba2;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h3 class="login-title">用户登录</h3>
    
    <div th:if="${param.error}" class="alert alert-danger">
        手机号或密码错误
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        注册成功，请登录
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
        已退出登录
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="mb-3">
            <label class="form-label">手机号</label>
            <input type="text" name="phone" class="form-control" placeholder="请输入手机号" required>
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
    </form>

    <div class="links">
        还没有账号？<a href="/user/register" class="register-link">立即注册</a>
    </div>
</div>
</body>
</html>
