<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #FF4400; --primary-dark: #E63E00; }
        body {
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 4px;
            padding: 2rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            border: 1px solid #e8e8e8;
        }
        .login-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 20px;
            font-weight: 700;
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            width: 100%;
            padding: 0.6rem;
            border-radius: 4px;
            font-weight: 600;
        }
        .btn-primary:hover { background-color: var(--primary-dark); border-color: var(--primary-dark); }
        .form-control { border-radius: 4px; padding: 0.6rem; font-size: 14px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 0.2rem rgba(255,68,0,0.15); }
        .alert { border-radius: 4px; font-size: 13px; }
        .links { text-align: center; margin-top: 1rem; font-size: 13px; }
        .register-link { color: var(--primary); font-weight: 500; }
        .brand { color: var(--primary); font-weight: 700; text-align: center; margin-bottom: 0.5rem; font-size: 22px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">网上商城</div>
    <h3 class="login-title">用户登录</h3>
    
    <div th:if="${param.error}" class="alert alert-danger">
        手机号或密码错误
    </div>
    <div th:if="${param.registered}" class="alert alert-success">
        注册成功，请登录
    </div>
    <div th:if="${param.logout}" class="alert alert-info">
        已退出登录
    </div>

    <form th:action="@{/user/login}" method="post">
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">手机号</label>
            <input type="text" name="phone" class="form-control" placeholder="请输入手机号" required>
        </div>
        <div class="mb-3">
            <label class="form-label" style="font-size: 13px;">密码</label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
    </form>

    <div class="links">
        还没有账号？<a href="/user/register" class="register-link">立即注册</a>
    </div>
</div>
</body>
</html>
